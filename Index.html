<!DOCTYPE html>

</head>
<body class="text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- CONFIG & CONSTANTS ---
    const ADMIN_EMAIL = "toei.mar168@gmail.com";
    const STATUS_LIST = ['ลีดใหม่', 'นัดหมาย', 'เสนอแบบ', 'ติดตามผล', 'ปิดการขาย'];
    const CHART_COLORS = ['#3b82f6', '#f97316', '#10b981', '#8b5cf6', '#ec4899'];
    
    // --- TELEGRAM CONFIG ---
    const TELEGRAM_BOT_TOKEN = "8772333460:AAG95AcJZFw8AJrpqJdh8LuPa2z2cDF0w2c";
    // อัปเดต Chat ID ห้องรวม
    const TELEGRAM_CHAT_ID = "-1003760920538";

    // --- UTILITIES ---
    const formatCurrency = (val) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', maximumFractionDigits: 0 }).format(val || 0);
    const calculateAge = (dob) => {
      if(!dob) return 0;
      const diff_ms = Date.now() - new Date(dob).getTime();
      const age_dt = new Date(diff_ms); 
      return Math.abs(age_dt.getUTCFullYear() - 1970);
    };
    const toBuddhistYear = (dateStr) => {
      if(!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear() + 543}`;
    };
    const getTodayStr = () => new Date().toISOString().split('T')[0];

    const Icon = ({ name, size = 20, className = "" }) => <i className={`ph ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const IconFill = ({ name, size = 20, className = "" }) => <i className={`ph-fill ph-${name} ${className}`} style={{ fontSize: size }}></i>;

    const notifyTelegram = (message, targetChatId = TELEGRAM_CHAT_ID) => {
      if (!targetChatId) return; 
      const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: targetChatId,
          text: `🔔 <b>IA CRM Alert</b>\n\n${message}`,
          parse_mode: "HTML"
        })
      }).catch(err => console.error("Telegram Error:", err));
    };

    // --- CUSTOM CSS BAR CHART ---
    function CSSBarChart({ data }) {
      const maxCount = Math.max(...data.map(d => d.count), 1);
      return (
        <div className="flex items-end justify-around h-[350px] pt-10 border-b-2 border-slate-100 pb-2">
          {data.map((d, i) => (
             <div key={i} className="flex flex-col items-center w-full group cursor-pointer">
               <div className="relative w-12 md:w-20 rounded-t-xl transition-all duration-700 ease-out flex items-end justify-center pb-2" 
                    style={{height: `${(d.count / maxCount) * 100}%`, minHeight: '30px', backgroundColor: CHART_COLORS[i % CHART_COLORS.length]}}>
                 <span className="font-black text-white text-sm">{d.count}</span>
               </div>
               <span className="text-xs md:text-sm font-black text-slate-500 mt-4">{d.name}</span>
             </div>
          ))}
        </div>
      );
    }

    // ============================================================================
    // MAIN APP
    // ============================================================================
    function NovaCRMApp() {
      const [appState, setAppState] = useState('loading');
      const [db, setDb] = useState(null);
      const [toastMsg, setToastMsg] = useState(null);
      const [users, setUsers] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [tasks, setTasks] = useState([]);
      
      // เปลี่ยนแปลงส่วนนี้ให้ดึงข้อมูลที่จำไว้จาก localStorage ขึ้นมาใช้เลย
      const [currentUser, setCurrentUser] = useState(() => {
        const savedUser = localStorage.getItem('crm_logged_in_user');
        return savedUser ? JSON.parse(savedUser) : null;
      });
      const [currentRoute, setCurrentRoute] = useState('home');
      const [isSidebarOpen, setSidebarOpen] = useState(false);

      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 3000); };

      useEffect(() => {
        let isMounted = true;

        const initSystem = async () => {
          try {
            if (!window.MY_FIREBASE_CONFIG) { 
                console.error("No Firebase Config"); 
                if(isMounted) setAppState('ready'); 
                return; 
            }
            if (!firebase.apps.length) firebase.initializeApp(window.MY_FIREBASE_CONFIG);
            
            const firestoreDb = firebase.firestore();
            setDb(firestoreDb);
            
            firebase.auth().onAuthStateChanged(user => {
                if(isMounted) {
                    if(!user) { 
                        firebase.auth().signInAnonymously().catch(err => { 
                            console.error("Auth Error", err); 
                            setAppState('ready'); 
                        }); 
                    } else {
                        setAppState('ready');
                    }
                }
            });
          } catch (err) { 
              console.error("Init Error", err); 
              if(isMounted) setAppState('ready'); 
          }
        };

        // ระบบข้ามหน้าโหลดอัตโนมัติ (เผื่อ Firebase โดนบล็อก)
        const fallbackTimer = setTimeout(() => {
            if (isMounted) setAppState(prev => prev === 'loading' ? 'ready' : prev);
        }, 3500);

        initSystem();

        return () => { 
            isMounted = false; 
            clearTimeout(fallbackTimer); 
        };
      }, []);

      useEffect(() => {
        if(!db) return;
        const unsubU = db.collection('crm_users').onSnapshot(snap => { const arr = []; snap.forEach(d => arr.push(d.data())); setUsers(arr); });
        const unsubC = db.collection('crm_customers').onSnapshot(snap => { const arr = []; snap.forEach(d => arr.push(d.data())); setCustomers(arr); });
        const unsubT = db.collection('crm_tasks').onSnapshot(snap => { const arr = []; snap.forEach(d => arr.push(d.data())); setTasks(arr); });
        return () => { unsubU(); unsubC(); unsubT(); };
      }, [db]);

      const writeData = async (collectionName, id, data) => {
        if(db) {
          try { await db.collection(collectionName).doc(id).set(data); } 
          catch(e) { console.error("Write error:", e); showToast("พบปัญหาบันทึกข้อมูล โปรดเช็ค Firebase Rules"); }
        }
      };

      const removeData = async (collectionName, id) => {
        if(db) { try { await db.collection(collectionName).doc(id).delete(); } catch(e) { console.error("Delete error:", e); } }
      };

      const handleAuthSuccess = async (user) => {
        const isNewUser = !users.find(u => u.id === user.id);
        if(isNewUser) {
           await writeData('crm_users', user.id, user);
           notifyTelegram(`👤 <b>ผู้ใช้ใหม่ลงทะเบียน:</b>\nชื่อ: ${user.name}\nทีม: ${user.team} | สิทธิ์: ${user.role}`);
        } else {
           notifyTelegram(`🔑 <b>เข้าสู่ระบบ:</b>\nชื่อ: ${user.name}\nทีม: ${user.team}`);
        }
        // บันทึกการเข้าสู่ระบบลง LocalStorage
        localStorage.setItem('crm_logged_in_user', JSON.stringify(user));
        setCurrentUser(user);
        setCurrentRoute('home');
      };

      const handleUpdateUser = async (updatedUser) => {
        await writeData('crm_users', updatedUser.id, updatedUser);
        if(currentUser && currentUser.id === updatedUser.id) {
            setCurrentUser(updatedUser);
            // อัปเดตข้อมูลที่จำไว้ด้วย
            localStorage.setItem('crm_logged_in_user', JSON.stringify(updatedUser));
        }
        notifyTelegram(`⚙️ <b>อัปเดตข้อมูลผู้ใช้:</b>\nชื่อ: ${updatedUser.name}\nทีม: ${updatedUser.team}\nเป้ายอดขาย: ${formatCurrency(updatedUser.targetRevenue)}`);
      };

      const addCustomer = (data) => { 
        writeData('crm_customers', data.id, { ...data, agent_id: currentUser.id }); 
        showToast('บันทึกข้อมูลลูกค้าสำเร็จ!'); 
        
        if(data.status === 'ปิดการขาย') {
            notifyTelegram(`🎉 <b>ปิดการขายสำเร็จ! (Closed Deal)</b>\nยอดเยี่ยมมาก! ${currentUser.name} เพิ่มและปิดการขายลูกค้า: ${data.name}\nยอดเบี้ยรวม: ${formatCurrency(data.premium)}`, TELEGRAM_CHAT_ID);
        } else {
            notifyTelegram(`🆕 <b>เพิ่ม Lead ใหม่:</b>\nชื่อ: ${data.name}\nเบอร์โทร: ${data.phone}\nโดย: ${currentUser.name}`);
        }
      };

      const updateCustomer = (data, newlyAddedPolicies = []) => { 
        const oldData = customers.find(c => c.id === data.id);
        writeData('crm_customers', data.id, data); 
        showToast('อัปเดตข้อมูลลูกค้าเรียบร้อย!'); 
        
        // 1. แจ้งเตือนเมื่อสถานะเปลี่ยนเป็น "ปิดการขาย"
        if (oldData && oldData.status !== 'ปิดการขาย' && data.status === 'ปิดการขาย') {
            notifyTelegram(`🎉 <b>ปิดการขายสำเร็จ! (Closed Deal)</b>\nยอดเยี่ยมมาก! ${currentUser.name} เพิ่งปิดการขายลูกค้า: ${data.name}\nยอดเบี้ยรวม: ${formatCurrency(data.premium)}\nแผน: ${data.interestedPlan || '-'}`, TELEGRAM_CHAT_ID);
        } 
        // 2. แจ้งเตือนเมื่อมีการกด "เพิ่มกรมธรรม์" ใหม่ (นับยอดเบี้ยที่เก็บได้)
        else if (newlyAddedPolicies && newlyAddedPolicies.length > 0) {
            newlyAddedPolicies.forEach(p => {
                notifyTelegram(`💰 <b>แจ้งเก็บเบี้ยรับใหม่!</b>\nตัวแทน: ${currentUser.name}\nลูกค้า: ${data.name}\nแผน: ${p.planName}\nเบี้ยที่เก็บได้: ${formatCurrency(p.premium)}`, TELEGRAM_CHAT_ID);
            });
        }
      };

      const deleteCustomer = (id) => { 
        const c = customers.find(x => x.id === id);
        removeData('crm_customers', id); 
        showToast('ลบข้อมูลลูกค้าเรียบร้อย!'); 
        notifyTelegram(`🗑️ <b>ลบข้อมูลลูกค้า:</b>\nชื่อ: ${c ? c.name : id}\nโดย: ${currentUser.name}`);
      };
      
      const addTask = (data) => { 
        writeData('crm_tasks', data.id, { ...data, agent_id: currentUser.id }); 
        showToast('เพิ่มงานสำเร็จ!'); 
        notifyTelegram(`📝 <b>เพิ่มงานใหม่:</b>\nหัวข้อ: ${data.title}\nวันที่: ${data.date}\nโดย: ${currentUser.name}`);
      };

      const toggleTask = (id) => {
          const t = tasks.find(x => x.id === id);
          if(t) {
             writeData('crm_tasks', t.id, { ...t, status: t.status === 'completed' ? 'pending' : 'completed' });
             notifyTelegram(`✅ <b>อัปเดตสถานะงาน:</b>\nหัวข้อ: ${t.title}\nเป็น: ${t.status === 'completed' ? 'รอดำเนินการ' : 'เสร็จสิ้น'}\nโดย: ${currentUser.name}`);
          }
      };

      const removeTask = (id) => {
         const t = tasks.find(x => x.id === id);
         removeData('crm_tasks', id);
         if(t) notifyTelegram(`❌ <b>ลบงาน:</b>\nหัวข้อ: ${t.title}\nโดย: ${currentUser.name}`);
      };

      if (appState === 'loading') return <div className="h-screen w-screen flex flex-col items-center justify-center bg-slate-50"><Icon name="spinner-gap" size={48} className="animate-spin mb-4 text-blue-500" /><p className="font-bold text-slate-400">กำลังเชื่อมต่อฐานข้อมูล...</p></div>;
      if (!currentUser) return <AuthView onSuccess={handleAuthSuccess} users={users} />;

      return (
        <div className="flex h-screen bg-slate-50 overflow-hidden text-slate-800">
          {toastMsg && (
            <div className="fixed top-6 right-6 z-[200] bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 animate-in slide-in-from-top-10 fade-in duration-300">
               <IconFill name="check-circle" size={24}/> <span className="font-black">{toastMsg}</span>
            </div>
          )}

          {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden backdrop-blur-sm" onClick={() => setSidebarOpen(false)} />}
          
          <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl lg:shadow-none`}>
            <div className="h-24 flex items-center px-8 border-b border-slate-100">
              <div className="flex items-center gap-3">
                <div className="bg-gradient-to-tr from-blue-600 to-indigo-600 p-2.5 rounded-2xl shadow-lg shadow-blue-500/30">
                  <Icon name="activity" className="text-white" size={24} />
                </div>
                <span className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 tracking-tight">IA CRM</span>
              </div>
              <button className="lg:hidden ml-auto text-slate-400 bg-slate-100 p-2 rounded-xl" onClick={() => setSidebarOpen(false)}><Icon name="x" size={20}/></button>
            </div>
            
            <nav className="flex-1 overflow-y-auto p-5 space-y-2 custom-scrollbar">
              <MenuLink icon="house" label="แดชบอร์ดหลัก" active={currentRoute === 'home'} onClick={() => {setCurrentRoute('home'); setSidebarOpen(false);}} color="text-blue-600" bg="bg-blue-50 border-blue-100" />
              {currentUser.role === 'agent' && (
                <>
                  <MenuLink icon="user-plus" label="เพิ่ม Lead ใหม่" active={currentRoute === 'add-lead'} onClick={() => {setCurrentRoute('add-lead'); setSidebarOpen(false);}} color="text-orange-500" bg="bg-orange-50 border-orange-100" />
                  <MenuLink icon="users" label="ฐานลูกค้าของฉัน" active={currentRoute === 'customers'} onClick={() => {setCurrentRoute('customers'); setSidebarOpen(false);}} color="text-emerald-500" bg="bg-emerald-50 border-emerald-100" />
                  <MenuLink icon="funnel" label="Pipeline การขาย" active={currentRoute === 'pipeline'} onClick={() => {setCurrentRoute('pipeline'); setSidebarOpen(false);}} color="text-purple-500" bg="bg-purple-50 border-purple-100" />
                  <MenuLink icon="trend-up" label="สถิติ KPI (Analytics)" active={currentRoute === 'analytics'} onClick={() => {setCurrentRoute('analytics'); setSidebarOpen(false);}} color="text-pink-500" bg="bg-pink-50 border-pink-100" />
                  <MenuLink icon="brain" label="AI Assistant" active={currentRoute === 'ai-assistant'} onClick={() => {setCurrentRoute('ai-assistant'); setSidebarOpen(false);}} color="text-indigo-500" bg="bg-indigo-50 border-indigo-100" />
                  <MenuLink icon="trophy" label="Team Ranking" active={currentRoute === 'ranking'} onClick={() => {setCurrentRoute('ranking'); setSidebarOpen(false);}} color="text-yellow-500" bg="bg-yellow-50 border-yellow-100" />
                </>
              )}
              {currentUser.role === 'admin' && (
                <>
                  <MenuLink icon="shield-check" label="ภาพรวมองค์กร" active={currentRoute === 'home'} onClick={() => {setCurrentRoute('home'); setSidebarOpen(false);}} color="text-indigo-600" bg="bg-indigo-50 border-indigo-100" />
                  <MenuLink icon="database" label="ฐานข้อมูลลูกค้าทั้งหมด" active={currentRoute === 'admin-customers'} onClick={() => {setCurrentRoute('admin-customers'); setSidebarOpen(false);}} color="text-emerald-600" bg="bg-emerald-50 border-emerald-100" />
                </>
              )}
              <div className="pt-4 mt-4 border-t border-slate-100">
                <MenuLink icon="qr-code" label="1QR+" active={false} href="https://agency-trainning.carrd.co/" onClick={() => setSidebarOpen(false)} color="text-teal-500" bg="bg-teal-50 border-teal-100" />
                <MenuLink icon="gear" label="ตั้งค่าโปรไฟล์" active={currentRoute === 'settings'} onClick={() => {setCurrentRoute('settings'); setSidebarOpen(false);}} color="text-slate-600" bg="bg-slate-100 border-slate-200" />
              </div>
            </nav>

            <div className="p-6 bg-slate-50 border-t border-slate-200">
              <div className="flex items-center gap-4 mb-5">
                <div className="w-12 h-12 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center font-black text-white text-xl shadow-md border-2 border-white">
                  {currentUser.name.charAt(0)}
                </div>
                <div className="truncate flex-1">
                  <p className="text-sm font-black text-slate-800 truncate">{currentUser.name}</p>
                  <p className="text-[10px] font-bold text-slate-500 bg-slate-200 inline-block px-2 py-0.5 rounded-md mt-1 uppercase tracking-widest">{currentUser.role === 'admin' ? 'ADMINISTRATOR' : currentUser.team}</p>
                </div>
              </div>
              <button onClick={() => { localStorage.removeItem('crm_logged_in_user'); setCurrentUser(null); }} className="w-full flex items-center justify-center gap-2 py-3 rounded-2xl bg-white border-2 border-slate-200 text-slate-600 hover:bg-red-50 hover:text-red-600 transition-all font-black text-sm">
                <Icon name="sign-out" size={18} /> ออกจากระบบ
              </button>
            </div>
          </aside>

          <main className="flex-1 overflow-auto relative bg-slate-50/50">
            <header className="h-24 bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-30 px-6 lg:px-10 flex items-center justify-between shadow-sm">
              <div className="flex items-center gap-4">
                <button className="lg:hidden p-2.5 bg-white border-2 border-slate-200 rounded-xl text-slate-600" onClick={() => setSidebarOpen(true)}>
                  <Icon name="list" size={24} />
                </button>
                <h1 className="text-2xl font-black text-slate-800 uppercase tracking-tight capitalize hidden sm:block">
                  {currentRoute.replace('-', ' ')}
                </h1>
              </div>
              <div className="flex items-center gap-4">
                 <div className={`flex items-center gap-2 px-4 py-2 rounded-xl border bg-emerald-50 border-emerald-100`}>
                    <div className={`w-2.5 h-2.5 rounded-full animate-pulse bg-emerald-500`}></div>
                    <span className={`text-xs font-black uppercase tracking-widest text-emerald-700`}>Cloud Sync</span>
                 </div>
              </div>
            </header>

            <div className="p-4 lg:p-10 max-w-[1600px] mx-auto space-y-10 pb-24 animate-in fade-in duration-500">
              {currentUser.role === 'admin' ? (
                 <>
                   {currentRoute === 'home' && <AdminHomeView users={users} customers={customers} showToast={showToast} />}
                   {currentRoute === 'admin-customers' && <AdminCustomersView customers={customers} users={users} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer} />}
                   {currentRoute === 'settings' && <SettingsView user={currentUser} handleUpdateUser={handleUpdateUser} showToast={showToast} />}
                 </>
              ) : (
                 <>
                    {currentRoute === 'home' && <AgentHomeView user={currentUser} customers={customers} tasks={tasks} addTask={addTask} toggleTask={toggleTask} removeTask={removeTask} handleUpdateUser={handleUpdateUser} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer} />}
                    {currentRoute === 'add-lead' && <AddLeadView onAdd={addCustomer} setRoute={setCurrentRoute} />}
                    {currentRoute === 'customers' && <CustomersView user={currentUser} customers={customers} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer} />}
                    {currentRoute === 'pipeline' && <PipelineView customers={customers.filter(c => c.agent_id === currentUser.id)} />}
                    {currentRoute === 'analytics' && <AnalyticsView customers={customers.filter(c => c.agent_id === currentUser.id)} />}
                    {currentRoute === 'ranking' && <RankingView users={users} customers={customers} currentUser={currentUser} />}
                    {currentRoute === 'ai-assistant' && <AIAssistantView />}
                    {currentRoute === 'settings' && <SettingsView user={currentUser} handleUpdateUser={handleUpdateUser} showToast={showToast} />}
                 </>
              )}
            </div>
          </main>
        </div>
      );
    }

    function MenuLink({ icon, label, active, onClick, color, bg, href }) {
      const className = `w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-black group ${active ? `${bg} ${color} border-2 shadow-sm transform scale-[1.02]` : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800 border-2 border-transparent'}`;
      
      // ฟังก์ชันเปิดลิงก์ที่บังคับทำงานให้ได้ 100% ไม่ว่าจะติดบล็อกอะไรก็ตาม
      const handleNavigation = (e) => {
        if (onClick) onClick(e);
        try {
            // พยายามเปิดแท็บใหม่
            const newWin = window.open(href, '_blank', 'noopener,noreferrer');
            // ถ้าแอปหรือเบราว์เซอร์บล็อก (เช่น ในแชทไลน์ หรือ Iframe แบบจำกัด)
            if (!newWin || newWin.closed || typeof newWin.closed === 'undefined') {
                window.location.href = href; // บังคับเปลี่ยนหน้าปัจจุบันไปเลย
            }
        } catch(err) {
            window.location.href = href; // Fallback หากติด Error Strict Mode
        }
      };

      if (href) {
        return (
          <button onClick={handleNavigation} className={className}>
            <Icon name={icon} size={22} className={`${active ? color : 'text-slate-400 group-hover:'+color} transition-colors`} />
            {label}
          </button>
        );
      }
      
      return (
        <button onClick={onClick} className={className}>
          <Icon name={icon} size={22} className={`${active ? color : 'text-slate-400 group-hover:'+color} transition-colors`} />
          {label}
        </button>
      );
    }

      const myCustomers = customers.filter(c => c.agent_id === user.id);
      const myTasks = tasks.filter(t => t.agent_id === user.id);
      
      const currentMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      const monthRev = myCustomers.reduce((acc, c) => {
        if (c.status === 'ปิดการขาย' && c.closedDate) {
          const d = new Date(c.closedDate);
          if(d.getMonth() === currentMonth && d.getFullYear() === currentYear) return acc + (Number(c.premium) || 0);
        }
        return acc;
      }, 0);
      const progress = Math.min(100, Math.round((monthRev / (user.targetRevenue || 1)) * 100));

      // --- SMART ALERTS (5 Rules) ---
      const alerts = useMemo(() => {
        const arr = [];
        const today = new Date();
        
        myCustomers.forEach(c => {
          if(c.appointmentDate) {
            const diff = Math.ceil((new Date(c.appointmentDate) - today) / (1000*60*60*24));
            if(diff === 0) arr.push({ title: 'นัดพบ/โทร วันนี้!', desc: `คุณมีนัดกับ ${c.name}`, icon: 'calendar-check', color: 'text-blue-600', bg: 'bg-blue-50 border-blue-200', customer: c });
            else if(diff > 0 && diff <= 3) arr.push({ title: 'นัดหมายเร็วๆ นี้', desc: `นัด ${c.name} ใน ${diff} วัน (${toBuddhistYear(c.appointmentDate)})`, icon: 'clock', color: 'text-indigo-600', bg: 'bg-indigo-50 border-indigo-200', customer: c });
          }
          if(c.dob) {
            const bday = new Date(c.dob); bday.setFullYear(today.getFullYear());
            if(bday < today && today.getMonth() > bday.getMonth()) bday.setFullYear(today.getFullYear() + 1);
            const diff = Math.ceil((bday - today) / (1000*60*60*24));
            if(diff >= 0 && diff <= 7) arr.push({ title: 'วันเกิดลูกค้า', desc: `${c.name} ครบรอบวันเกิดในอีก ${diff} วัน`, icon: 'gift', color: 'text-pink-600', bg: 'bg-pink-50 border-pink-200', customer: c });
          }
          if(c.policies) {
            c.policies.forEach(p => {
              const diff = Math.ceil((new Date(p.endDate) - today) / (1000*60*60*24));
              if(diff >= 0 && diff <= 30) arr.push({ title: 'แจ้งเตือนต่ออายุ', desc: `กรมธรรม์ ${p.planName} ของ ${c.name} จะหมดใน ${diff} วัน`, icon: 'file-text', color: 'text-orange-600', bg: 'bg-orange-50 border-orange-200', customer: c });
            });
          }
          if(c.status !== 'ปิดการขาย' && c.lastContact) {
            const diff = Math.ceil((today - new Date(c.lastContact)) / (1000*60*60*24));
            if(diff > 30) arr.push({ title: 'Lead ไม่มีการอัปเดต', desc: `${c.name} ขาดการติดต่อนาน ${diff} วันแล้ว`, icon: 'warning-circle', color: 'text-red-600', bg: 'bg-red-50 border-red-200', customer: c });
          }
          if(c.status === 'ปิดการขาย' && c.closedDate) {
            const diff = Math.ceil((today - new Date(c.closedDate)) / (1000*60*60*24));
            if(diff >= 90 && diff <= 95) arr.push({ title: 'ดูแลหลังการขาย (Aftercare)', desc: `ปิดการขาย ${c.name} ครบ 3 เดือนแล้ว โทรไปทักทายหน่อย`, icon: 'phone-call', color: 'text-emerald-600', bg: 'bg-emerald-50 border-emerald-200', customer: c });
          }
        });
        return arr;

      // --- TELEGRAM DAILY DIGEST ---

                  notifyTelegram(inactiveMsg, TELEGRAM_CHAT_ID);

              localStorage.setItem(storageKey, 'true');

    // --- MODAL ---
    function CustomerModal({ customer, onClose, onSave, onDelete }) {
      const [formData, setFormData] = useState({ ...customer });
      const [isAddingPolicy, setIsAddingPolicy] = useState(false);
      const [newPolicy, setNewPolicy] = useState({ planName: '', policyNo: '', cycle: 'รายปี', startDate: '', endDate: '', premium: '' });
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [aiInsight, setAiInsight] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(false);
      const [newlyAddedPoliciesForAlert, setNewlyAddedPoliciesForAlert] = useState([]);
      const [newCareNote, setNewCareNote] = useState('');

      const handleChange = (e) => {
        const { name, value } = e.target;
        if(name === 'dob') setFormData(prev => ({ ...prev, [name]: value, age: calculateAge(value) }));
        else setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleSave = () => {
        if(formData.status === 'ปิดการขาย' && customer.status !== 'ปิดการขาย') {
            formData.closedDate = getTodayStr();
        }
        if (!formData.lastContact) formData.lastContact = getTodayStr(); 
        
        onSave(formData, newlyAddedPoliciesForAlert); 
        onClose();
      };

      const handleAddPolicy = () => {
        if(!newPolicy.planName || !newPolicy.endDate) return alert("กรุณากรอกชื่อแผนและวันต่ออายุ");
        const parsedPremium = Number(newPolicy.premium || 0);
        
        const policyToAdd = { ...newPolicy, premium: parsedPremium };

        setFormData(prev => ({ 
          ...prev, 
          premium: Number(prev.premium || 0) + parsedPremium,
          policies: [...(prev.policies || []), policyToAdd] 
        }));

        setNewlyAddedPoliciesForAlert(prev => [...prev, policyToAdd]);

        setIsAddingPolicy(false);
        setNewPolicy({ planName: '', policyNo: '', cycle: 'รายปี', startDate: '', endDate: '', premium: '' });
      };

      const handleAddCareNote = () => {
        if(!newCareNote.trim()) return alert("กรุณากรอกรายละเอียดการติดต่อ");
        const newHistory = [...(formData.careHistory || []), { date: getTodayStr(), note: newCareNote.trim() }];
        setFormData(prev => ({ 
          ...prev, 
          careHistory: newHistory,
          lastContact: getTodayStr() // อัปเดตวันที่ติดต่อล่าสุดอัตโนมัติเมื่อมีการเพิ่มบันทึก
        }));
        setNewCareNote('');
      };

      const generateAiInsight = () => {
        setIsAiLoading(true);
        setTimeout(() => {
          let insight = "";
          if (formData.status === 'ปิดการขาย') insight = `AI (Aftercare): ลูกค้าปิดการขายแผน ${formData.interestedPlan} ไปแล้ว แนะนำให้รักษาสัมพันธ์และนำเสนอแผนควบการลงทุนเพิ่มเติมในปีหน้า`;
          else if (formData.status === 'นัดหมาย') insight = `AI (Closing Strategy): ลูกค้ามีรายได้ ${formData.income} และสนใจแผน ${formData.interestedPlan} มีโอกาสปิดการขาย 85% เตรียมข้อมูลเรื่องภาษีไปนำเสนอเพิ่มเติม`;
          else insight = `AI วิเคราะห์: ลูกค้ามีสถานะ ${formData.status} แนะนำให้ส่งบทความสั้นๆ ทาง Line (${formData.lineId || 'เบอร์โทร'}) ก่อนโทรคุย`;
          setAiInsight(insight); setIsAiLoading(false);
        }, 1500);
      };

      return (
        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-4 sm:p-6">
          <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-300">
            <div className="px-10 py-6 border-b border-slate-100 flex justify-between items-center bg-white z-10">
              <div><h2 className="text-3xl font-black text-slate-800">{formData.name}</h2><p className="text-slate-400 font-bold uppercase tracking-widest text-xs mt-1">จัดการข้อมูลและอัปเดตสถานะการขาย</p></div>
              <button onClick={onClose} className="text-slate-400 hover:bg-slate-100 p-3 rounded-2xl transition"><Icon name="x" size={24}/></button>

            <div className="flex-1 overflow-y-auto p-6 lg:p-10 space-y-10 custom-scrollbar bg-slate-50/50">
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="lg:col-span-2 space-y-10">
                  {/* QUICK STATUS EDIT */}

                    <div className="space-y-3"><label className="block text-xs font-black text-slate-400 uppercase tracking-widest">ปรับสถานะ</label><select name="status" value={formData.status} onChange={handleChange} className="w-full px-5 py-4 border-2 border-blue-200 rounded-2xl bg-blue-50 font-black text-blue-800 outline-none text-lg">{STATUS_LIST.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                    <div className="space-y-3"><label className="block text-xs font-black text-slate-400 uppercase tracking-widest">ยอดขายรวมลูกค้ารายนี้</label><input type="number" name="premium" value={formData.premium} onChange={handleChange} className="w-full px-5 py-4 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-black text-lg text-slate-800" /></div>
                    <div className="space-y-3"><label className="block text-xs font-black text-slate-400 uppercase tracking-widest">วันนัดหมายต่อไป</label><input type="date" name="appointmentDate" value={formData.appointmentDate} onChange={handleChange} className="w-full px-5 py-4 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-black text-slate-700" /></div>
                    <div className="space-y-3">
                       <label className="block text-xs font-black text-slate-400 uppercase tracking-widest">วันที่ติดต่อล่าสุด</label>
                       <div className="flex gap-2">
                          <input type="date" name="lastContact" value={formData.lastContact || ''} onChange={handleChange} className="w-full px-3 py-4 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-black text-slate-700" />
                          <button type="button" onClick={() => setFormData(prev => ({...prev, lastContact: getTodayStr()}))} className="bg-blue-50 border-2 border-blue-100 text-blue-600 px-3 rounded-2xl font-black hover:bg-blue-100 transition" title="อัปเดตเป็นวันนี้"><Icon name="arrows-clockwise" size={20}/></button>
                       </div>
                    </div>
                  </div>

                  {/* EDITABLE DETAILS (แสดงข้อมูลครบถ้วน) */}
                  <div className="bg-white rounded-[2rem] p-8 border border-slate-100 shadow-sm">
                    <h3 className="font-black text-slate-800 mb-6 text-2xl border-b-2 border-slate-100 pb-4 flex items-center gap-3"><Icon name="user" size={28} className="text-blue-500"/> ข้อมูลรายละเอียดลูกค้า</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      <div className="space-y-2"><label className="block text-xs font-black text-slate-400">ชื่อ-นามสกุล</label><input type="text" name="name" value={formData.name || ''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black" /></div>
                      <div className="space-y-2"><label className="block text-xs font-black text-slate-400">เบอร์โทร</label><input type="text" name="phone" value={formData.phone || ''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black" /></div>
                      <div className="space-y-2"><label className="block text-xs font-black text-slate-400">Line ID</label><input type="text" name="lineId" value={formData.lineId || ''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black" /></div>
                      
                      <div className="space-y-2"><label className="block text-xs font-black text-slate-400">เพศ</label><select name="gender" value={formData.gender || ''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"><option value="Male">ชาย</option><option value="Female">หญิง</option></select></div>
                      <div className="space-y-2"><label className="block text-xs font-black text-slate-400">วันเกิด (ค.ศ.)</label><input type="date" name="dob" value={formData.dob || ''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black" /></div>
                      <div className="space-y-2"><label className="block text-xs font-black text-slate-400">อายุ (ปี)</label><input type="number" readOnly value={formData.age || 0} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-100 text-slate-500 font-black cursor-not-allowed" /></div>
                      
                      <div className="space-y-2"><label className="block text-xs font-black text-slate-400">อาชีพ</label><input type="text" name="occupation" value={formData.occupation || ''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black" /></div>

                      <button type="button" onClick={handleAddCareNote} className="px-8 py-4 bg-blue-600 text-white font-black rounded-2xl hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-lg"><Icon name="plus" size={20}/> เพิ่มบันทึก</button>
                    </div>

                    <div className="space-y-3 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                      {(!formData.careHistory || formData.careHistory.length === 0) ? (
                        <div className="bg-white p-6 rounded-2xl text-center border-2 border-blue-100 border-dashed"><p className="text-blue-500 font-bold text-sm">ยังไม่มีประวัติการติดต่อ</p></div>

                          <div key={i} className="bg-white p-5 rounded-2xl border border-blue-100 shadow-sm flex flex-col sm:flex-row gap-4 items-start sm:items-center">

                            <div className="font-bold text-slate-700 text-sm leading-relaxed">{h.note}</div>

                  {/* POLICIES */}
                  {formData.status === 'ปิดการขาย' && (
                    <div className="bg-emerald-50/50 rounded-[2rem] p-8 border-2 border-emerald-200 shadow-inner">
                      <div className="flex justify-between items-center mb-8">
                        <div><h3 className="font-black text-emerald-800 flex items-center gap-3 text-2xl"><Icon name="shield-check" size={32}/> กรมธรรม์ที่ซื้อแล้ว</h3></div>
                        <button onClick={() => setIsAddingPolicy(!isAddingPolicy)} className="px-6 py-3 bg-emerald-600 text-white font-black rounded-xl hover:bg-emerald-700 flex items-center gap-2 shadow-lg"><Icon name="plus" size={20}/> เพิ่มกรมธรรม์</button>
                      </div>

                      {isAddingPolicy && (
                        <div className="bg-white p-6 rounded-3xl border-2 border-emerald-200 mb-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 shadow-md animate-in fade-in">
                          <div className="md:col-span-2"><label className="text-[10px] font-black text-slate-400 mb-1 block">ชื่อแผน</label><input type="text" value={newPolicy.planName} onChange={(e)=>setNewPolicy({...newPolicy, planName: e.target.value})} className="w-full border-2 rounded-xl px-4 py-2 font-black" /></div>
                          <div><label className="text-[10px] font-black text-slate-400 mb-1 block">เลขกรมธรรม์</label><input type="text" value={newPolicy.policyNo} onChange={(e)=>setNewPolicy({...newPolicy, policyNo: e.target.value})} className="w-full border-2 rounded-xl px-4 py-2 font-black" /></div>
                          <div>
                            <label className="text-[10px] font-black text-slate-400 mb-1 block">รอบชำระ</label>
                            <select value={newPolicy.cycle} onChange={(e)=>setNewPolicy({...newPolicy, cycle: e.target.value})} className="w-full border-2 rounded-xl px-4 py-2 font-black">
                                <option value="รายเดือน">รายเดือน</option>
                                <option value="ราย 3 เดือน">ราย 3 เดือน</option>
                                <option value="ราย 6 เดือน">ราย 6 เดือน</option>
                                <option value="รายปี">รายปี</option>
                            </select>
                          </div>
                          <div className="lg:col-span-2"><label className="text-[10px] font-black text-red-400 mb-1 block">วันต่ออายุ *</label><input type="date" value={newPolicy.endDate} onChange={(e)=>setNewPolicy({...newPolicy, endDate: e.target.value})} className="w-full border-2 border-orange-200 bg-orange-50 rounded-xl px-4 py-2 font-black text-orange-800" /></div>
                          <div className="lg:col-span-2"><label className="text-[10px] font-black text-emerald-600 mb-1 block">ค่าเบี้ย</label><input type="number" value={newPolicy.premium} onChange={(e)=>setNewPolicy({...newPolicy, premium: e.target.value})} className="w-full border-2 border-emerald-200 bg-emerald-50 rounded-xl px-4 py-2 font-black text-emerald-800" /></div>
                          <button onClick={handleAddPolicy} className="md:col-span-2 lg:col-span-4 py-3 bg-emerald-500 text-white rounded-xl font-black mt-2">บันทึกข้อมูลกรมธรรม์</button>
                        </div>
                      )}

                      {(!formData.policies || formData.policies.length === 0) ? (
                        <div className="bg-white p-8 rounded-3xl text-center border-2 border-emerald-100 border-dashed"><p className="text-emerald-600 font-black">ยังไม่มีข้อมูลกรมธรรม์</p></div>
                      ) : (
                        <div className="space-y-4">
                          {formData.policies.map((p, i) => (
                            <div key={i} className="bg-white p-6 rounded-[2rem] border-2 border-emerald-100 flex flex-wrap justify-between items-center gap-5 shadow-sm">
                              <div>
                                <p className="font-black text-xl text-slate-800">{p.planName}</p>
                                <p className="text-xs font-black text-slate-400 mt-2 uppercase tracking-widest">เลข: {p.policyNo || '-'} | รอบ: {p.cycle} | เบี้ย: <span className="text-emerald-600">{formatCurrency(p.premium)}</span></p>
                              </div>
                              <div className="text-right bg-orange-50 px-6 py-3 rounded-2xl border border-orange-100"><p className="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-1">วันต่ออายุ</p><p className="font-black text-orange-700 text-xl">{toBuddhistYear(p.endDate)}</p></div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* AI INSIGHT */}
                <div className="lg:col-span-1">
                   <div className="bg-gradient-to-br from-indigo-900 to-purple-900 rounded-[2rem] p-8 text-white shadow-xl h-full flex flex-col relative overflow-hidden">
                      <Icon name="sparkle" className="absolute top-4 right-4 text-indigo-400 opacity-50" size={64}/>
                      <h3 className="font-black text-xl flex items-center gap-3 mb-6 z-10"><Icon name="brain" size={28}/> AI วิเคราะห์แนะนำ</h3>
                      <div className="flex-1 bg-white/10 rounded-2xl p-6 z-10 flex flex-col justify-center">
                        {aiInsight ? <p className="text-indigo-50 font-bold leading-relaxed">{aiInsight}</p> : <div className="text-center"><Icon name="brain" size={48} className="mx-auto mb-4 text-indigo-300 opacity-50" /><p className="text-indigo-200 font-semibold text-sm">กดวิเคราะห์ข้อมูล</p></div>}
                      </div>
                      <button onClick={generateAiInsight} disabled={isAiLoading} className="w-full mt-6 bg-indigo-500 hover:bg-indigo-400 text-white font-black py-4 rounded-xl shadow-lg transition z-10">{isAiLoading ? 'กำลังประมวลผล...' : 'วิเคราะห์ข้อมูลลูกค้าทันที'}</button>
                   </div>
                </div>
              </div>
            </div>

            <div className="px-6 lg:px-10 py-6 border-t border-slate-100 bg-white flex justify-between z-10 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
              {deleteConfirm ? (
                 <div className="flex gap-2">
                    <button onClick={() => setDeleteConfirm(false)} className="px-6 py-3 bg-slate-100 rounded-xl font-black text-slate-600">ยกเลิก</button>
                    <button onClick={() => { onDelete(customer.id); onClose(); }} className="px-6 py-3 bg-red-600 rounded-xl font-black text-white shadow-lg">ยืนยันการลบ!</button>
                 </div>
              ) : (
                 <button onClick={() => setDeleteConfirm(true)} className="px-6 py-3 text-red-500 hover:bg-red-50 rounded-2xl font-black transition flex items-center gap-2"><Icon name="trash" size={20}/> ลบข้อมูล</button>
              )}
              <div className="flex gap-4">
                <button onClick={onClose} className="px-8 py-4 text-slate-500 hover:bg-slate-100 rounded-2xl font-black transition">ปิดหน้าต่าง</button>
                <button onClick={handleSave} className="px-12 py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 transition shadow-xl shadow-blue-500/40 text-lg">บันทึกการแก้ไข</button>

    // --- PIPELINE VIEW ---
    function PipelineView({ customers }) {
      return (
        <div className="space-y-8 h-[calc(100vh-160px)] flex flex-col">
          <div><h2 className="text-4xl font-black text-slate-800 flex items-center gap-3"><Icon name="funnel" className="text-purple-500" size={40}/> Sales Pipeline</h2><p className="text-slate-500 font-bold mt-2 uppercase tracking-widest text-sm">บอร์ดสรุปขั้นตอนการขายของลูกค้าทั้งหมด</p></div>
          <div className="flex gap-6 overflow-x-auto pb-6 custom-scrollbar flex-1 items-start">
            {STATUS_LIST.map((status, idx) => {
              const list = customers.filter(c => c.status === status);
              return (
                <div key={status} className="bg-slate-100/70 rounded-[2.5rem] p-6 min-w-[340px] w-[340px] border-2 border-slate-200/50 max-h-full overflow-y-auto custom-scrollbar shadow-inner">
                  <h3 className="font-black text-slate-700 mb-6 flex justify-between items-center text-xl">{status} <span className="bg-white px-3.5 py-1 rounded-xl text-sm shadow-sm">{list.length}</span></h3>
                  <div className="space-y-4">
                    {list.map(c => (
                      <div key={c.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 border-l-8 hover:shadow-md transition-all cursor-pointer transform hover:-translate-y-1" style={{borderLeftColor: CHART_COLORS[idx % CHART_COLORS.length]}}>
                        <p className="font-black text-lg text-slate-800">{c.name}</p>
                        <p className="text-xs font-bold text-slate-400 mt-2 flex items-center gap-1.5"><Icon name="phone" size={12}/> {c.phone}</p>
                        <div className="mt-4 pt-4 border-t border-slate-50"><p className="text-sm font-black text-slate-600 truncate">{c.interestedPlan || 'รอระบุแผน'}</p>{c.premium > 0 && <p className="text-sm font-black text-emerald-600 mt-2 bg-emerald-50 w-fit px-3 py-1 rounded-xl">{formatCurrency(c.premium)}</p>}</div>
                      </div>
                    ))}
                    {list.length === 0 && <div className="border-2 border-dashed border-slate-300 rounded-[2rem] p-8 text-center text-slate-400 font-black">ไม่มีข้อมูล</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // --- ANALYTICS VIEW ---
    function AnalyticsView({ customers }) {
      const currentMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      
      const closedThisMonth = customers.filter(c => c.status === 'ปิดการขาย' && c.closedDate && new Date(c.closedDate).getMonth() === currentMonth);
      const revThisMonth = closedThisMonth.reduce((acc, c) => acc + Number(c.premium||0), 0);
      const avgCase = closedThisMonth.length ? Math.round(revThisMonth / closedThisMonth.length) : 0;
      const convRate = customers.length ? Math.round((customers.filter(c=>c.status==='ปิดการขาย').length / customers.length)*100) : 0;

      const closedThisYear = customers.filter(c => c.status === 'ปิดการขาย' && c.closedDate && new Date(c.closedDate).getFullYear() === currentYear);
      const revThisYear = closedThisYear.reduce((acc, c) => acc + Number(c.premium||0), 0);

      const monthlyData = new Array(12).fill(0);
      closedThisYear.forEach(c => { monthlyData[new Date(c.closedDate).getMonth()] += Number(c.premium||0); });
      const bestMonthVal = Math.max(...monthlyData);
      const bestMonthIndex = monthlyData.indexOf(bestMonthVal);
      const monthNames = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
      const bestMonthName = bestMonthVal > 0 ? monthNames[bestMonthIndex] : '-';

      const prevMonthRev = currentMonth > 0 ? monthlyData[currentMonth - 1] : 0;
      let growth = 0;
      if(prevMonthRev > 0) growth = Math.round(((revThisMonth - prevMonthRev) / prevMonthRev) * 100);
      else if (revThisMonth > 0) growth = 100;

      const kpis = [
        { title: 'รายได้เดือนนี้', val: formatCurrency(revThisMonth), color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-100' },
        { title: 'รายได้รวมทั้งปี', val: formatCurrency(revThisYear), color: 'text-indigo-600', bg: 'bg-indigo-50', border: 'border-indigo-100' },
        { title: 'เคสที่ปิดได้ (ด)', val: `${closedThisMonth.length} เคส`, color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-100' },
        { title: 'เฉลี่ยต่อเคส (ด)', val: formatCurrency(avgCase), color: 'text-purple-600', bg: 'bg-purple-50', border: 'border-purple-100' },
        { title: 'Conversion Rate', val: `${convRate}%`, color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-100' },
        { title: 'Best Month', val: bestMonthName, color: 'text-pink-600', bg: 'bg-pink-50', border: 'border-pink-100' },
        { title: 'Growth (YoM)', val: `${growth > 0 ? '+'+growth : growth}%`, color: growth >= 0 ? 'text-emerald-600' : 'text-red-600', bg: growth >= 0 ? 'bg-emerald-50' : 'bg-red-50', border: growth >= 0 ? 'border-emerald-100' : 'border-red-100' },
      ];

      const chartData = STATUS_LIST.map(s => ({ name: s, count: customers.filter(c=>c.status===s).length }));

      return (
        <div className="space-y-10">
          <div><h2 className="text-4xl font-black text-slate-800 flex items-center gap-3"><Icon name="trend-up" className="text-pink-500" size={40}/> Analytics & KPI</h2><p className="text-slate-500 font-bold mt-2 uppercase tracking-widest text-sm">วิเคราะห์ผลงาน สถิติรายได้ และการเติบโตของคุณ</p></div>

    // --- FUNCTIONAL AI ASSISTANT VIEW ---
    function AIAssistantView() {
      const [inputText, setInputText] = useState('');
      const [messages, setMessages] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages, isLoading]);

      const handleSend = async () => {
        if (!inputText.trim() || isLoading) return;

        const userMsg = inputText.trim();
        setInputText('');
        setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
        setIsLoading(true);

        try {
          const apiKey = "AIzaSyDbHog1AJB9nmrPvQtBefDIeF-uy_y4XjU"; // API Key ที่ระบุ
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
          
          const payload = {
            contents: [{ parts: [{ text: userMsg }] }],
            systemInstruction: {
              parts: [{ text: "คุณคือ AI ผู้ช่วยสำหรับตัวแทนขายประกันภัยในระบบ IA CRM ให้คำแนะนำเกี่ยวกับการปิดการขาย สร้างสคริปต์การโทร ตอบข้อโต้แย้ง และวิเคราะห์ข้อมูลลูกค้า ตอบเป็นภาษาไทยด้วยความสุภาพ มืออาชีพ และกระชับเข้าใจง่าย ใช้ Markdown ในการจัดรูปแบบข้อความให้สวยงามได้" }]
            }
          };

          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error?.message || 'API Error');
          }
          
          const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'ขออภัย ไม่สามารถประมวลผลได้ในขณะนี้';
          
          setMessages(prev => [...prev, { role: 'model', text: reply }]);
        } catch (error) {
          console.error("AI Error:", error);
          setMessages(prev => [...prev, { role: 'model', text: 'ขออภัย ระบบ AI ไม่สามารถตอบกลับได้ในขณะนี้ โปรดลองใหม่อีกครั้งในภายหลังครับ' }]);
        } finally {
          setIsLoading(false);
        }
      };

      const formatMessage = (text) => {
          return { __html: text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') };
      };

      return (
        <div className="max-w-4xl mx-auto space-y-8 flex flex-col h-[calc(100vh-160px)]">
          <div className="bg-gradient-to-br from-indigo-900 via-purple-900 to-indigo-800 rounded-[3rem] p-8 lg:p-12 shadow-2xl text-white relative overflow-hidden flex flex-col flex-1 min-h-0 border border-indigo-500/20">
            <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-white/5 rounded-full blur-3xl -mt-40 -mr-40 pointer-events-none"></div>
            
            {messages.length === 0 ? (
                <div className="flex-1 flex flex-col items-center justify-center text-center relative z-10 animate-in fade-in zoom-in duration-500">
                    <Icon name="brain" size={80} className="mx-auto mb-8 text-indigo-300 animate-pulse drop-shadow-[0_0_15px_rgba(165,180,252,0.5)]" />
                    <h2 className="text-4xl lg:text-5xl font-black mb-4 tracking-tight">IA AI Assistant</h2>
                    <p className="text-indigo-200 font-bold text-lg max-w-xl mx-auto leading-relaxed">พิมพ์ปรึกษา AI ผู้ช่วยได้เลย! <br/>เช่น "ขอสคริปต์โทรหาลูกค้าเก่า", "วิธีตอบข้อโต้แย้งเรื่องเบี้ยแพง", หรือ "ช่วยคิดแผนประกันสำหรับคนอายุ 30"</p>
                </div>
            ) : (
                <div className="flex-1 overflow-y-auto mb-6 pr-2 space-y-6 custom-scrollbar relative z-10">
                    {messages.map((msg, idx) => (
                        <div key={idx} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'} animate-in slide-in-from-bottom-2 fade-in duration-300`}>
                            <div className={`max-w-[85%] p-5 rounded-3xl ${msg.role === 'user' ? 'bg-indigo-500 text-white rounded-br-sm shadow-md' : 'bg-white/10 text-indigo-50 rounded-bl-sm border border-white/10 backdrop-blur-md shadow-inner'}`}>
                                {msg.role === 'model' && <Icon name="sparkle" className="text-indigo-300 mb-2" size={20}/>}
                                <p className="whitespace-pre-wrap font-medium leading-relaxed" dangerouslySetInnerHTML={formatMessage(msg.text)}></p>

                    {isLoading && (

                    <div ref={messagesEndRef} />
                </div>
            )}

            <form onSubmit={(e) => { e.preventDefault(); handleSend(); }} className="mt-auto bg-white/10 p-3 rounded-3xl flex flex-col md:flex-row gap-3 backdrop-blur-xl border border-white/20 relative z-10 shadow-inner shrink-0">
              <input type="text" value={inputText} onChange={e => setInputText(e.target.value)} disabled={isLoading} placeholder="พิมพ์ข้อความปรึกษา AI ที่นี่..." className="flex-1 bg-transparent border-none text-white outline-none placeholder-indigo-300/70 font-bold px-5 py-3" />

                ส่ง <Icon name="paper-plane-right" weight="fill" />
              </button>
            </form>
          </div>
        </div>
      );
    }

              <label className="text-xs font-black block mb-2 text-slate-400">Chat ID (สำหรับการแจ้งเตือน)</label>
              <div className="flex gap-2">
                <input type="text" placeholder="เช่น 123456789" value={formData.telegramChatId} onChange={e=>setFormData({...formData, telegramChatId: e.target.value})} className="flex-1 border-2 rounded-xl px-5 py-4 font-bold outline-none focus:border-blue-500"/>
                <button type="button" onClick={testTelegramNotification} className="bg-blue-100 text-blue-600 px-6 rounded-xl font-black hover:bg-blue-200 transition">ทดสอบส่ง</button>
              </div>
            </div>

            <button onClick={() => { handleUpdateUser({...user, ...formData}); showToast('บันทึกการตั้งค่าโปรไฟล์เรียบร้อย!'); }} className="w-full py-4 bg-slate-900 text-white rounded-xl font-black text-lg hover:bg-slate-800 transition mt-4">บันทึกการเปลี่ยนแปลง</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NovaCRMApp />);
  </script>
</body>
</html>
