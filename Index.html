<!DOCTYPE html>

<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova CRM — Insurance Sales Platform</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');
    * { font-family: 'Noto Sans Thai', 'Inter', sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; }

    .fade-in { animation: fadeSlideIn 0.35s ease forwards; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, createElement: h } = React;

// ─── CONFIG ────────────────────────────────────────────────────────────────
const ADMIN_EMAIL   = "toei.mar168@gmail.com";
const STATUS_LIST   = ['ลีดใหม่','นัดหมาย','เสนอแบบ','ติดตามผล','ปิดการขาย'];
const COLORS        = ['#3b82f6','#f97316','#10b981','#8b5cf6','#ec4899'];

// ─── ICONS (lucide) ────────────────────────────────────────────────────────
const Icon = ({ name, size=20, className='' }) => {
  useEffect(() => { if(window.lucide) lucide.createIcons(); });
  return <i data-lucide={name} style={{width:size,height:size}} className={`inline-block ${className}`}></i>;
};

// ─── UTILITIES ─────────────────────────────────────────────────────────────
const fmt  = v => new Intl.NumberFormat('th-TH',{style:'currency',currency:'THB',maximumFractionDigits:0}).format(v||0);
const age  = dob => { if(!dob) return 0; const d=new Date(Date.now()-new Date(dob)); return Math.abs(d.getUTCFullYear()-1970); };
const bYear= s => { if(!s) return '-'; const d=new Date(s); return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()+543}`; };
const today= () => new Date().toISOString().split('T')[0];
const uid  = () => Date.now().toString(36)+Math.random().toString(36).slice(2);

// ─── CLAUDE API ────────────────────────────────────────────────────────────
async function askClaude(messages, system='') {
  const r = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system, messages })
  });
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content.map(c=>c.text||'').join('\n');
}

// ─── RECHARTS HELPERS ─────────────────────────────────────────────────────
const { BarChart, Bar, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

// ══════════════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════════════
export default function App() {
  const [users,     setUsers]     = useState([]);
  const [customers, setCustomers] = useState([]);
  const [tasks,     setTasks]     = useState([]);
  const [me,        setMe]        = useState(null);
  const [route,     setRoute]     = useState('home');
  const [sidebar,   setSidebar]   = useState(false);

  // sync me after users update
  useEffect(()=>{ if(me){ const u=users.find(u=>u.id===me.id); if(u) setMe(u); } },[users]);

  const auth = (email,pass,name,team,isLogin) => {
    if(isLogin){
      const u=users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.password===pass);
      if(u){ setMe(u); setRoute('home'); } else alert('รหัสผ่านหรืออีเมลไม่ถูกต้อง');
    } else {
      if(users.find(u=>u.email.toLowerCase()===email.toLowerCase())){ alert('อีเมลนี้ถูกใช้แล้ว'); return; }
      const role = email.toLowerCase()===ADMIN_EMAIL.toLowerCase()?'admin':'agent';
      const u = { id:uid(), name, email, password:pass, team: role==='admin'?'HQ':team, role, target:100000 };
      setUsers(p=>[...p,u]); setMe(u); setRoute('home');
    }
  };

  if(!me) return <AuthView onAuth={auth} users={users}/>;

  const nav = me.role==='agent' ? [
    {r:'home',      icon:'home',         label:'แดชบอร์ด',       c:'text-blue-600',   b:'bg-blue-50 border-blue-200'},
    {r:'add-lead',  icon:'user-plus',    label:'เพิ่ม Lead ใหม่', c:'text-orange-500', b:'bg-orange-50 border-orange-200'},
    {r:'customers', icon:'users',        label:'ฐานลูกค้า',       c:'text-emerald-500',b:'bg-emerald-50 border-emerald-200'},
    {r:'pipeline',  icon:'filter',       label:'Sales Pipeline',  c:'text-purple-500', b:'bg-purple-50 border-purple-200'},
    {r:'analytics', icon:'trending-up',  label:'Analytics & KPI', c:'text-pink-500',   b:'bg-pink-50 border-pink-200'},
    {r:'ai',        icon:'brain-circuit',label:'AI Assistant',    c:'text-indigo-500', b:'bg-indigo-50 border-indigo-200'},
    {r:'ranking',   icon:'trophy',       label:'Team Ranking',    c:'text-yellow-500', b:'bg-yellow-50 border-yellow-200'},
  ] : [
    {r:'home',       icon:'shield-check',label:'ภาพรวมองค์กร',    c:'text-indigo-600', b:'bg-indigo-50 border-indigo-200'},
    {r:'admin-data', icon:'database',    label:'ฐานข้อมูลรวม',    c:'text-emerald-600',b:'bg-emerald-50 border-emerald-200'},
  ];

  const addC = d => setCustomers(p=>[...p,{...d,id:uid(),agent_id:me.id}]);
  const updC = d => setCustomers(p=>p.map(c=>c.id===d.id?d:c));
  const delC = id=> setCustomers(p=>p.filter(c=>c.id!==id));
  const addT = d => setTasks(p=>[...p,{...d,id:uid(),agent_id:me.id}]);
  const togT = id=> setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const delT = id=> setTasks(p=>p.filter(t=>t.id!==id));

  const myC = customers.filter(c=>c.agent_id===me.id);

  return (
    <div className="flex h-screen bg-slate-50 overflow-hidden">
      {/* overlay */}
      {sidebar && <div className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden" onClick={()=>setSidebar(false)}/>}

      {/* SIDEBAR */}
      <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300 ${sidebar?'translate-x-0':'-translate-x-full'} lg:translate-x-0`}>
        <div className="h-16 flex items-center px-5 border-b border-slate-100">
          <div className="flex items-center gap-2 flex-1">
            <div className="bg-gradient-to-tr from-blue-600 to-indigo-600 p-1.5 rounded-xl">
              <Icon name="activity" size={18} className="text-white"/>
            </div>
            <span className="text-lg font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">Nova CRM</span>
          </div>
          <button className="lg:hidden p-1.5 text-slate-400" onClick={()=>setSidebar(false)}><Icon name="x" size={18}/></button>
        </div>
        <nav className="flex-1 overflow-y-auto p-3 space-y-1 custom-scrollbar">
          {nav.map(n=>(
            <button key={n.r} onClick={()=>{setRoute(n.r);setSidebar(false);}}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl font-bold text-sm transition-all ${route===n.r?`${n.b} ${n.c} border-2`:'text-slate-500 hover:bg-slate-50 border-2 border-transparent'}`}>
              <Icon name={n.icon} size={16} className={route===n.r?n.c:'text-slate-400'}/>
              {n.label}
            </button>
          ))}
          <div className="pt-2 mt-2 border-t border-slate-100">
            <button onClick={()=>{setRoute('settings');setSidebar(false);}}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl font-bold text-sm transition-all ${route==='settings'?'bg-slate-100 border-slate-200 text-slate-700 border-2':'text-slate-500 hover:bg-slate-50 border-2 border-transparent'}`}>
              <Icon name="settings" size={16} className="text-slate-400"/> ตั้งค่าโปรไฟล์
            </button>
          </div>
        </nav>
        <div className="p-4 border-t border-slate-200 bg-slate-50">
          <div className="flex items-center gap-3 mb-3">
            <div className="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center font-black text-white shadow-md border-2 border-white">
              {me.name.charAt(0)}
            </div>
            <div className="flex-1 min-w-0">
              <p className="text-sm font-black text-slate-800 truncate">{me.name}</p>
              <p className="text-[9px] font-bold text-slate-500 bg-slate-200 px-1.5 py-0.5 rounded-md uppercase tracking-widest inline-block mt-0.5">{me.role==='admin'?'ADMIN':me.team}</p>
            </div>
          </div>
          <button onClick={()=>setMe(null)} className="w-full flex items-center justify-center gap-1.5 py-2 rounded-xl bg-white border-2 border-slate-200 text-slate-500 hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition font-black text-xs">
            <Icon name="log-out" size={14}/> ออกจากระบบ
          </button>
        </div>
      </aside>

      {/* MAIN */}
      <main className="flex-1 overflow-auto">
        <header className="h-14 bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-30 px-4 lg:px-6 flex items-center justify-between shadow-sm">
          <div className="flex items-center gap-3">
            <button className="lg:hidden p-2 border-2 border-slate-200 rounded-xl text-slate-500" onClick={()=>setSidebar(true)}><Icon name="menu" size={18}/></button>
            <span className="font-black text-slate-800">{nav.find(n=>n.r===route)?.label || 'ตั้งค่า'}</span>
          </div>
          <div className="flex items-center gap-1.5 bg-emerald-50 px-3 py-1 rounded-xl border border-emerald-100">
            <span className="w-2 h-2 bg-emerald-500 rounded-full pulse inline-block"></span>
            <span className="text-xs font-black text-emerald-700">Online</span>
          </div>
        </header>

        <div className="p-4 lg:p-6 max-w-7xl mx-auto pb-12 fade-in">
          {me.role==='admin' ? <>
            {route==='home'      && <AdminHome users={users} customers={customers}/>}
            {route==='admin-data'&& <AdminData customers={customers} users={users} updC={updC} delC={delC}/>}
            {route==='settings'  && <Settings me={me} users={users} setUsers={setUsers}/>}
          </> : <>
            {route==='home'      && <AgentHome me={me} customers={customers} tasks={tasks} addT={addT} togT={togT} delT={delT} setUsers={setUsers} users={users} updC={updC} delC={delC}/>}
            {route==='add-lead'  && <AddLead onAdd={addC} setRoute={setRoute}/>}
            {route==='customers' && <Customers me={me} customers={customers} updC={updC} delC={delC}/>}
            {route==='pipeline'  && <Pipeline customers={myC}/>}
            {route==='analytics' && <Analytics customers={myC} me={me}/>}
            {route==='ai'        && <AIChat me={me} customers={myC}/>}
            {route==='ranking'   && <Ranking users={users} customers={customers} me={me}/>}
            {route==='settings'  && <Settings me={me} users={users} setUsers={setUsers}/>}
          </>}
        </div>
      </main>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════════════════
function AuthView({onAuth, users}){
  const [tab,setTab]   = useState('login');
  const [em,setEm]     = useState('');
  const [pw,setPw]     = useState('');
  const [nm,setNm]     = useState('');
  const [tm,setTm]     = useState('');

  useEffect(()=>{
    if(em.includes('@')){
      const exists=users.find(u=>u.email.toLowerCase()===em.toLowerCase());
      setTab(exists?'login':'register');
    }
  },[em]);

  const submit = e => { e.preventDefault(); onAuth(em,pw,nm,tm,tab==='login'); };

  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-blue-950 to-indigo-950">
      <div className="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md border border-white/10 fade-in">
        <div className="text-center mb-7">
          <div className="w-16 h-16 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-500/30">
            <Icon name="activity" size={30} className="text-white"/>
          </div>
          <h2 className="text-3xl font-black text-slate-800">Nova CRM</h2>
          <p className="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1">Insurance Sales Platform</p>
        </div>

        <div className="flex bg-slate-100 p-1 rounded-2xl mb-6">
          <button onClick={()=>setTab('login')}    className={`flex-1 py-2 font-black text-sm rounded-xl transition ${tab==='login'   ?'bg-white text-blue-600 shadow':'text-slate-500'}`}>เข้าสู่ระบบ</button>
          <button onClick={()=>setTab('register')} className={`flex-1 py-2 font-black text-sm rounded-xl transition ${tab==='register'?'bg-white text-blue-600 shadow':'text-slate-500'}`}>ลงทะเบียน</button>
        </div>

        <form onSubmit={submit} className="space-y-4">
          <Field label="อีเมล" type="email" value={em} onChange={e=>setEm(e.target.value)} required icon="mail"/>
          {tab==='register' && <>
            <Field label="ชื่อ - นามสกุล" type="text" value={nm} onChange={e=>setNm(e.target.value)} required icon="user"/>
            {em.toLowerCase()!==ADMIN_EMAIL.toLowerCase() && <Field label="ชื่อทีม" type="text" value={tm} onChange={e=>setTm(e.target.value)} required icon="users"/>}
          </>}
          <Field label={tab==='login'?'รหัสผ่าน':'ตั้งรหัสผ่าน'} type="password" value={pw} onChange={e=>setPw(e.target.value)} required icon="lock"/>
          <button type="submit" className="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-black rounded-2xl shadow-xl shadow-blue-500/30 transition mt-2">
            {tab==='login'?'เข้าสู่ระบบ':'ลงทะเบียนและเริ่มใช้งาน'}
          </button>
        </form>
      </div>
    </div>
  );
}

function Field({label,icon,...props}){
  return (
    <div>
      <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-1.5">{label}</label>
      <div className="relative">
        <Icon name={icon} size={15} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"/>
        <input {...props} className="w-full pl-10 pr-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-800 transition text-sm"/>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// AGENT HOME
// ══════════════════════════════════════════════════════════════════════════
function AgentHome({me,customers,tasks,addT,togT,delT,setUsers,users,updC,delC}){
  const [editTarget,setEditTarget] = useState(false);
  const [tmpTarget, setTmpTarget]  = useState(me.target||100000);
  const [newTask,   setNewTask]    = useState('');
  const [taskDate,  setTaskDate]   = useState(today());
  const [modal,     setModal]      = useState(null);

  const myC  = customers.filter(c=>c.agent_id===me.id);
  const myT  = tasks.filter(t=>t.agent_id===me.id);
  const mo   = new Date().getMonth(), yr = new Date().getFullYear();
  const mRev = myC.filter(c=>c.status==='ปิดการขาย'&&c.closedDate&&new Date(c.closedDate).getMonth()===mo&&new Date(c.closedDate).getFullYear()===yr).reduce((a,c)=>a+Number(c.premium||0),0);
  const pct  = Math.min(100,Math.round(mRev/(me.target||1)*100));

  const alerts = useMemo(()=>{
    const arr=[]; const now=new Date();
    myC.forEach(c=>{
      if(c.appt){ const d=Math.ceil((new Date(c.appt)-now)/864e5); if(d===0) arr.push({msg:`นัดพบ ${c.name} วันนี้!`,type:'blue',c}); else if(d>0&&d<=3) arr.push({msg:`นัด ${c.name} ใน ${d} วัน`,type:'indigo',c}); }
      if(c.dob){ const b=new Date(c.dob); b.setFullYear(now.getFullYear()); if(b<now) b.setFullYear(now.getFullYear()+1); const d=Math.ceil((b-now)/864e5); if(d>=0&&d<=7) arr.push({msg:`วันเกิด ${c.name} ใน ${d} วัน 🎂`,type:'pink',c}); }
      if(c.policies) c.policies.forEach(p=>{ const d=Math.ceil((new Date(p.endDate)-now)/864e5); if(d>=0&&d<=30) arr.push({msg:`กรมธรรม์ ${p.planName} ของ ${c.name} หมดใน ${d} วัน`,type:'orange',c}); });
      if(c.status!=='ปิดการขาย'&&c.lastContact){ const d=Math.ceil((now-new Date(c.lastContact))/864e5); if(d>30) arr.push({msg:`${c.name} ขาดการติดต่อ ${d} วัน`,type:'red',c}); }
    });
    return arr;
  },[myC]);

  const colorMap={blue:'bg-blue-50 border-blue-200 text-blue-700',indigo:'bg-indigo-50 border-indigo-200 text-indigo-700',pink:'bg-pink-50 border-pink-200 text-pink-700',orange:'bg-orange-50 border-orange-200 text-orange-700',red:'bg-red-50 border-red-200 text-red-700'};

  return (
    <div className="space-y-6">
      {/* Hero */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <div className="lg:col-span-2 bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-700 rounded-3xl p-7 text-white shadow-2xl relative overflow-hidden">
          <div className="absolute inset-0 bg-white/5 rounded-full w-96 h-96 blur-3xl -top-20 -right-20 pointer-events-none"/>
          <div className="flex flex-col md:flex-row justify-between gap-5 relative z-10">
            <div>
              <p className="text-blue-100 text-xs font-bold uppercase tracking-widest mb-2">เป้ายอดขายเดือนนี้</p>
              {editTarget
                ? <div className="flex gap-2"><input type="number" value={tmpTarget} onChange={e=>setTmpTarget(e.target.value)} className="bg-white text-slate-900 px-3 py-2 rounded-xl font-black w-36 outline-none text-xl"/><button onClick={()=>{setUsers(u=>u.map(x=>x.id===me.id?{...x,target:Number(tmpTarget)}:x));setEditTarget(false);}} className="bg-orange-400 px-4 rounded-xl font-black text-sm">SAVE</button></div>
                : <div className="flex items-center gap-2"><h2 className="text-4xl font-black">{fmt(me.target)}</h2><button onClick={()=>setEditTarget(true)} className="p-1.5 bg-white/20 rounded-full hover:bg-white/30 transition"><Icon name="edit-2" size={14}/></button></div>
              }
            </div>
            <div className="bg-white/10 p-4 rounded-2xl border border-white/20 backdrop-blur-md">
              <p className="text-blue-100 text-xs font-bold uppercase tracking-widest mb-1">ยอดขายที่ทำได้</p>
              <h3 className="text-2xl font-black text-amber-300">{fmt(mRev)}</h3>
            </div>
          </div>
          <div className="mt-6 relative z-10">
            <div className="flex justify-between text-xs font-black uppercase tracking-widest mb-2">
              <span className="text-blue-100">ความคืบหน้า</span>
              <span className="bg-white text-blue-800 px-2 py-0.5 rounded-lg">{pct}%</span>
            </div>
            <div className="h-3.5 bg-blue-900/40 rounded-full overflow-hidden p-0.5">
              <div className="h-full bg-gradient-to-r from-amber-400 to-orange-500 rounded-full transition-all duration-700" style={{width:`${pct}%`}}/>
            </div>
          </div>
        </div>
        <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-3">
          {[
            {label:'Lead ทั้งหมด',  val:myC.length,                                                                  c:'text-blue-600',   bg:'bg-blue-50'},
            {label:'ปิดการขายแล้ว', val:myC.filter(c=>c.status==='ปิดการขาย').length,                               c:'text-emerald-600',bg:'bg-emerald-50'},
            {label:'รอติดตาม',      val:myC.filter(c=>['นัดหมาย','เสนอแบบ','ติดตามผล'].includes(c.status)).length,  c:'text-orange-500', bg:'bg-orange-50'},
            {label:'งานค้าง',       val:myT.filter(t=>!t.done).length,                                               c:'text-purple-600', bg:'bg-purple-50'},
          ].map((x,i)=>(
            <div key={i} className={`flex justify-between items-center p-3 rounded-2xl ${x.bg}`}>
              <span className="text-xs font-black text-slate-500 uppercase tracking-widest">{x.label}</span>
              <span className={`text-2xl font-black ${x.c}`}>{x.val}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
        {/* Alerts */}
        <div className="bg-white rounded-3xl border border-slate-100 shadow-sm flex flex-col h-[500px] overflow-hidden">
          <div className="p-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
            <div>
              <h3 className="font-black text-slate-800 flex items-center gap-2"><Icon name="alert-circle" size={20} className="text-red-500"/> Smart Alerts</h3>

                    {t.done && <Icon name="check" size={12} className="text-white"/>}

                  <div>
                    <span className={`font-bold text-sm ${t.done?'line-through text-slate-400':'text-slate-800'}`}>{t.title}</span>

            ))}

        </div>
      </div>

      {modal && <CustModal c={modal} onClose={()=>setModal(null)} onSave={updC} onDel={delC}/>}

  );
}

            <div><label className={lc}>แหล่งที่มา</label><select name="source" value={f.source} onChange={set} className={ic}><option>Facebook Ads</option><option>Tiktok</option><option>Walk-in</option><option>Referral</option><option>Cold Call</option></select></div>

            <div className="md:col-span-2"><label className={lc}>หมายเหตุ</label><textarea name="note" value={f.note} onChange={set} rows={3} className={ic}/></div>

        <div className="flex justify-end gap-3 pt-4 border-t-2 border-slate-100">

            <Icon name="save" size={16}/> บันทึก Lead
          </button>
        </div>
      </form>
    </div>
  );
}

function Section({title,icon,color,children}){
  return (
    <div>
      <h3 className={`font-black text-slate-700 border-b-2 border-slate-100 pb-2 mb-4 flex items-center gap-2 text-sm`}>

      {children}
    </div>
  );
}

// CUSTOMERS

function Customers({me,customers,updC,delC}){
  const [tab,setTab]  = useState('ทั้งหมด');
  const [q,setQ]      = useState('');

  const myC = customers.filter(c=>c.agent_id===me.id);

  const sBadge = s => {
    if(s==='ปิดการขาย') return 'bg-emerald-50 border-emerald-200 text-emerald-700';
    if(s==='ลีดใหม่')   return 'bg-blue-50 border-blue-200 text-blue-700';
    if(s==='เสนอแบบ')   return 'bg-purple-50 border-purple-200 text-purple-700';
    return 'bg-orange-50 border-orange-200 text-orange-700';

  return (

      <div className="flex flex-col md:flex-row justify-between gap-3">
        <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2"><Icon name="database" size={26} className="text-emerald-500"/> ฐานข้อมูลลูกค้า</h2>
        <div className="relative w-full md:w-72">
          <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>

        </div>
      </div>
      <div className="flex overflow-x-auto custom-scrollbar gap-2 pb-1">
        {['ทั้งหมด',...STATUS_LIST].map(t=>(
          <button key={t} onClick={()=>setTab(t)} className={`px-5 py-2 rounded-xl font-black text-xs whitespace-nowrap border-2 transition ${tab===t?'bg-blue-600 text-white border-blue-600 shadow-lg':'bg-white text-slate-500 border-slate-200'}`}>
            {t} <span className={`ml-1.5 px-2 py-0.5 rounded-lg text-[10px] font-black ${tab===t?'bg-white/20 text-white':'bg-slate-100 text-slate-500'}`}>{t==='ทั้งหมด'?myC.length:myC.filter(c=>c.status===t).length}</span>
          </button>
        ))}
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {list.map(c=>(
          <div key={c.id} className="bg-white rounded-3xl p-5 border-2 border-slate-100 shadow-sm hover:shadow-xl hover:border-blue-200 transition-all group">
            <div className="flex items-center gap-3 mb-3">
              <div className="w-11 h-11 bg-slate-100 rounded-xl flex items-center justify-center font-black text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition text-lg">{c.name.charAt(0)}</div>
              <div>
                <h3 className="font-black text-slate-800">{c.name}</h3>
                <p className="text-xs text-slate-400 font-bold flex items-center gap-1"><Icon name="phone" size={10}/> {c.phone}</p>
              </div>
            </div>
            <span className={`inline-block px-3 py-1 rounded-xl text-xs font-black border-2 uppercase tracking-widest mb-3 ${sBadge(c.status)}`}>{c.status}</span>
            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-2 mb-4">
              {[['AI Score',`${c.ai_score||0}/100`],['นัดหมาย',c.appt?bYear(c.appt):'-'],['แผน',c.plan||'-']].map(([k,v],i)=>(
                <div key={i} className={`flex justify-between text-xs ${i>0?'border-t border-slate-200 pt-2':''}`}>
                  <span className="font-bold text-slate-400 uppercase tracking-widest">{k}</span>
                  <span className="font-black text-slate-700 truncate max-w-[120px] text-right">{v}</span>
                </div>
              ))}
            </div>
            <button onClick={()=>setModal(c)} className="w-full py-2.5 bg-white hover:bg-blue-50 text-blue-600 font-black rounded-xl border-2 border-slate-200 hover:border-blue-300 transition flex items-center justify-center gap-1.5 text-sm">
              ดู / แก้ไข <Icon name="chevron-right" size={14}/>
            </button>
          </div>
        ))}
      </div>
      {list.length===0 && <div className="bg-white p-12 rounded-3xl text-center border-2 border-slate-100"><Icon name="database" size={56} className="mx-auto text-slate-200 mb-3"/><p className="font-black text-slate-400">ไม่พบข้อมูลลูกค้า</p></div>}
      {modal && <CustModal c={modal} onClose={()=>setModal(null)} onSave={updC} onDel={delC}/>}
    </div>
  );
}

              {f.status==='ปิดการขาย' && (
                <div className="bg-emerald-50 rounded-2xl p-5 border-2 border-emerald-200">
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="font-black text-emerald-800 flex items-center gap-2 text-sm"><Icon name="shield-check" size={16}/> กรมธรรม์</h3>

                  </div>
                  {addPol && (
                    <div className="bg-white p-4 rounded-2xl border-2 border-emerald-200 mb-4 grid grid-cols-2 gap-3">
                      <div className="col-span-2"><label className="text-xs font-black text-slate-400 uppercase tracking-widest mb-1 block">ชื่อแบบประกัน *</label><input value={np.planName} onChange={e=>setNp({...np,planName:e.target.value})} className="w-full border-2 rounded-xl px-3 py-2 font-black text-sm outline-none focus:border-emerald-500"/></div>
                      <div><label className="text-xs font-black text-slate-400 uppercase tracking-widest mb-1 block">เลขกรมธรรม์</label><input value={np.policyNo} onChange={e=>setNp({...np,policyNo:e.target.value})} className="w-full border-2 rounded-xl px-3 py-2 font-black text-sm outline-none"/></div>
                      <div><label className="text-xs font-black text-slate-400 uppercase tracking-widest mb-1 block">รอบชำระ</label><select value={np.cycle} onChange={e=>setNp({...np,cycle:e.target.value})} className="w-full border-2 rounded-xl px-3 py-2 font-black text-sm outline-none"><option value="Monthly">รายเดือน</option><option value="3 Months">3 เดือน</option><option value="6 Months">6 เดือน</option><option value="Yearly">รายปี</option></select></div>
                      <div><label className="text-xs font-black text-slate-400 uppercase tracking-widest mb-1 block">วันเริ่ม</label><input type="date" value={np.startDate} onChange={e=>setNp({...np,startDate:e.target.value})} className="w-full border-2 rounded-xl px-3 py-2 font-black text-sm outline-none"/></div>
                      <div><label className="text-xs font-black text-red-400 uppercase tracking-widest mb-1 block">วันต่ออายุ *</label><input type="date" value={np.endDate} onChange={e=>setNp({...np,endDate:e.target.value})} className="w-full border-2 border-orange-200 bg-orange-50 rounded-xl px-3 py-2 font-black text-sm outline-none"/></div>
                      <div className="col-span-2"><label className="text-xs font-black text-emerald-600 uppercase tracking-widest mb-1 block">ค่าเบี้ย (บาท)</label><input type="number" value={np.premium} onChange={e=>setNp({...np,premium:e.target.value})} className="w-full border-2 border-emerald-200 bg-emerald-50 rounded-xl px-3 py-2 font-black text-sm outline-none"/></div>
                      <button onClick={()=>{ if(!np.planName||!np.endDate){alert('กรุณากรอกชื่อแผนและวันต่ออายุ');return;} setF(p=>({...p,premium:Number(p.premium||0)+Number(np.premium||0),policies:[...(p.policies||[]),np]})); setAddPol(false); setNp({planName:'',policyNo:'',cycle:'Yearly',startDate:'',endDate:'',premium:''});}} className="col-span-2 py-2.5 bg-emerald-500 text-white rounded-xl font-black text-sm">บันทึกกรมธรรม์</button>
                    </div>
                  )}
                  {(!f.policies||f.policies.length===0)
                    ? <div className="bg-white p-5 rounded-2xl text-center border-2 border-emerald-100 border-dashed"><p className="text-emerald-600 font-black text-sm">ยังไม่มีกรมธรรม์</p></div>
                    : f.policies.map((p,i)=>(
                      <div key={i} className="bg-white p-4 rounded-2xl border-2 border-emerald-100 flex justify-between items-center gap-3 mb-2 shadow-sm">
                        <div>
                          <p className="font-black text-slate-800 text-sm">{p.planName}</p>
                          <p className="text-xs font-bold text-slate-400 mt-0.5">{p.policyNo||''}{p.premium?` · ${fmt(p.premium)}`:''}</p>
                        </div>
                        <div className="bg-orange-50 px-3 py-1.5 rounded-xl text-right border border-orange-100">
                          <p className="text-[9px] font-black text-orange-500 uppercase">ต่ออายุ</p>
                          <p className="font-black text-orange-700 text-sm">{bYear(p.endDate)}</p>
                        </div>
                      </div>
                    ))
                  }
                </div>
              )}
            </div>
            {/* AI Panel */}
            <div className="bg-gradient-to-br from-indigo-900 to-purple-900 rounded-2xl p-5 text-white flex flex-col min-h-[380px]">
              <h3 className="font-black flex items-center gap-2 mb-4 text-sm"><Icon name="brain-circuit" size={18}/> AI วิเคราะห์</h3>
              <div className="flex-1 bg-white/10 rounded-xl border border-white/20 p-4 flex flex-col justify-center min-h-[200px]">
                {aiLoading ? (
                  <div className="flex flex-col items-center justify-center gap-2">
                    <div className="w-7 h-7 border-2 border-indigo-400 border-t-transparent rounded-full spin"></div>
                    <p className="text-indigo-200 text-xs font-bold">กำลังวิเคราะห์...</p>
                  </div>
                ) : aiErr ? (
                  <p className="text-red-300 text-xs font-bold text-center">{aiErr}</p>
                ) : aiText ? (
                  <p className="text-indigo-50 text-xs font-bold leading-relaxed whitespace-pre-wrap">{aiText}</p>
                ) : (
                  <div className="text-center">
                    <Icon name="sparkles" size={32} className="text-indigo-300 opacity-40 mx-auto mb-2"/>
                    <p className="text-indigo-200 text-xs font-bold">กดปุ่มด้านล่างเพื่อให้ AI วิเคราะห์กลยุทธ์การขาย</p>
                  </div>
                )}
              </div>
              <button onClick={askAI} disabled={aiLoading} className="mt-4 w-full bg-indigo-500 hover:bg-indigo-400 disabled:opacity-50 text-white font-black py-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5 transition">
                <Icon name="brain-circuit" size={14}/> {aiLoading?'กำลังประมวลผล...':'วิเคราะห์ลูกค้ารายนี้'}
              </button>
            </div>
          </div>
        </div>
        <div className="px-5 py-3.5 border-t border-slate-100 flex justify-between">
          <button onClick={()=>{ if(window.confirm('ลบลูกค้ารายนี้?')){ onDel(c.id); onClose(); }}} className="px-4 py-2 text-red-500 hover:bg-red-50 rounded-xl font-black text-sm flex items-center gap-1.5"><Icon name="trash-2" size={14}/> ลบ</button>
          <div className="flex gap-2">
            <button onClick={onClose} className="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-xl font-black text-sm">ปิด</button>
            <button onClick={save} className="px-6 py-2 bg-blue-600 text-white rounded-xl font-black text-sm hover:bg-blue-700 shadow-lg shadow-blue-500/20">บันทึก</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ANALYTICS
// ══════════════════════════════════════════════════════════════════════════
function Analytics({customers,me}){
  const mo=new Date().getMonth(), yr=new Date().getFullYear();
  const closedMo = customers.filter(c=>c.status==='ปิดการขาย'&&c.closedDate&&new Date(c.closedDate).getMonth()===mo&&new Date(c.closedDate).getFullYear()===yr);
  const revMo   = closedMo.reduce((a,c)=>a+Number(c.premium||0),0);
  const closedYr = customers.filter(c=>c.status==='ปิดการขาย'&&c.closedDate&&new Date(c.closedDate).getFullYear()===yr);
  const revYr   = closedYr.reduce((a,c)=>a+Number(c.premium||0),0);
  const conv    = customers.length?Math.round(customers.filter(c=>c.status==='ปิดการขาย').length/customers.length*100):0;
  const avg     = closedMo.length?Math.round(revMo/closedMo.length):0;

  const mnNames=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const mnData  = mnNames.map((name,i)=>({name,revenue:closedYr.filter(c=>new Date(c.closedDate).getMonth()===i).reduce((a,c)=>a+Number(c.premium||0),0)}));
  const stData  = STATUS_LIST.map(s=>({name:s,count:customers.filter(c=>c.status===s).length}));

  const kpis=[
    {t:'รายได้เดือนนี้', v:fmt(revMo),            c:'text-emerald-600', b:'bg-emerald-50', bd:'border-emerald-200'},
    {t:'รายได้ทั้งปี',   v:fmt(revYr),             c:'text-indigo-600',  b:'bg-indigo-50',  bd:'border-indigo-200'},
    {t:'เคสปิดได้',      v:`${closedMo.length}`,   c:'text-blue-600',    b:'bg-blue-50',    bd:'border-blue-200'},
    {t:'เฉลี่ย/เคส',    v:fmt(avg),               c:'text-purple-600',  b:'bg-purple-50',  bd:'border-purple-200'},
    {t:'Conversion',    v:`${conv}%`,              c:'text-orange-600',  b:'bg-orange-50',  bd:'border-orange-200'},
    {t:'Lead ทั้งหมด',  v:`${customers.length}`,   c:'text-pink-600',    b:'bg-pink-50',    bd:'border-pink-200'},
  ];

  return (
    <div className="space-y-6">
      <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2"><Icon name="trending-up" size={26} className="text-pink-500"/> Analytics & KPI</h2>
      <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3">
        {kpis.map((k,i)=>(
          <div key={i} className={`p-4 rounded-2xl border-2 ${k.bd} ${k.b} shadow-sm hover:shadow-md transition-all`}>
            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5">{k.t}</p>
            <h3 className={`text-lg font-black ${k.c}`}>{k.v}</h3>
          </div>
        ))}
      </div>
      <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
        <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm h-72">
          <h3 className="font-black text-slate-700 mb-3 text-sm">รายได้รายเดือน (ปีนี้)</h3>
          <ResponsiveContainer width="100%" height="88%">
            <AreaChart data={mnData}>
              <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.15}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
              <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill:'#94a3b8',fontWeight:'700',fontSize:10}}/>
              <Tooltip contentStyle={{borderRadius:'12px',border:'none',boxShadow:'0 10px 25px -5px rgb(0 0 0 / 0.1)',fontWeight:'bold'}} formatter={v=>[fmt(v),'รายได้']}/>
              <Area type="monotone" dataKey="revenue" stroke="#3b82f6" strokeWidth={2.5} fill="url(#g)"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm h-72">
          <h3 className="font-black text-slate-700 mb-3 text-sm">ลูกค้าในแต่ละขั้นตอน</h3>
          <ResponsiveContainer width="100%" height="88%">
            <BarChart data={stData}>
              <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
              <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill:'#94a3b8',fontWeight:'700',fontSize:9}}/>
              <Tooltip contentStyle={{borderRadius:'12px',border:'none',boxShadow:'0 10px 25px -5px rgb(0 0 0 / 0.1)',fontWeight:'bold'}}/>
              <Bar dataKey="count" radius={[8,8,0,0]}>{stData.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}</Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// AI CHAT (REAL CLAUDE API)
// ══════════════════════════════════════════════════════════════════════════
function AIChat({me,customers}){
  const [msgs,setMsgs] = useState([]);
  const [inp,setInp]   = useState('');
  const [loading,setLoad] = useState(false);
  const endRef = useRef(null);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  const sys=`คุณเป็น AI Assistant สำหรับตัวแทนประกัน "${me.name}" ทีม ${me.team}
ข้อมูล: Lead ${customers.length} ราย | ปิดแล้ว ${customers.filter(c=>c.status==='ปิดการขาย').length} ราย | รายได้รวม ${fmt(customers.filter(c=>c.status==='ปิดการขาย').reduce((a,c)=>a+Number(c.premium||0),0))}
ช่วยด้าน: กลยุทธ์ปิดการขาย, สคริปต์โทร, Follow-up, เลือกแผนประกัน
ตอบภาษาไทย กระชับ นำไปปฏิบัติได้จริง`;

  const quickPs=[
    'เขียนสคริปต์โทรหาลูกค้าใหม่ที่ยังไม่รู้จักเรา',
    'เทคนิค Follow-up ลูกค้าที่บอกว่า "ขอคิดดูก่อน"',
    'วิธีนำเสนอประกันโดยไม่กดดันลูกค้า',
    'จุดเด่นของประกันสะสมทรัพย์ที่อธิบายให้เข้าใจง่าย',
  ];

  const send = async (text) => {
    const t=(text||inp).trim();
    if(!t||loading) return;
    setInp('');
    const newMsgs=[...msgs,{role:'user',content:t}];
    setMsgs(newMsgs);
    setLoad(true);
    try {
      const r=await askClaude(newMsgs.map(m=>({role:m.role,content:m.content})),sys);
      setMsgs(p=>[...p,{role:'assistant',content:r}]);
    } catch(e){
      setMsgs(p=>[...p,{role:'assistant',content:'❌ ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่'}]);
    }
    setLoad(false);
  };

  return (
    <div className="max-w-3xl mx-auto">
      <div className="flex items-center gap-3 mb-4">
        <div className="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/30"><Icon name="brain-circuit" size={20} className="text-white"/></div>
        <div><h2 className="text-xl font-black text-slate-800">AI Sales Assistant</h2><p className="text-xs font-bold text-slate-400 uppercase tracking-widest">ขับเคลื่อนด้วย Claude AI</p></div>
        <div className="ml-auto flex items-center gap-1.5 bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-200">
          <span className="w-2 h-2 bg-emerald-500 rounded-full pulse inline-block"></span>
          <span className="text-xs font-black text-emerald-700">Connected</span>
        </div>
      </div>

      <div className="bg-gradient-to-br from-slate-900 to-indigo-950 rounded-3xl overflow-hidden shadow-2xl border border-indigo-900/50">
        <div className="h-[440px] overflow-y-auto p-5 space-y-4 custom-scrollbar">
          {msgs.length===0 && (
            <div className="flex flex-col items-center justify-center h-full text-center gap-4">
              <Icon name="brain-circuit" size={52} className="text-indigo-400 opacity-40"/>
              <div>
                <p className="text-white font-black text-lg mb-1.5">สวัสดีคุณ {me.name}! 👋</p>
                <p className="text-indigo-300 text-sm font-bold max-w-sm">ถามอะไรก็ได้เกี่ยวกับการขายประกัน</p>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 w-full max-w-lg">
                {quickPs.map((p,i)=>(
                  <button key={i} onClick={()=>send(p)} className="text-left p-3 bg-indigo-900/60 hover:bg-indigo-800/80 border border-indigo-700/50 rounded-2xl text-indigo-200 text-xs font-bold transition hover:-translate-y-0.5">
                    {p}
                  </button>
                ))}
              </div>
            </div>
          )}
          {msgs.map((m,i)=>(
            <div key={i} className={`flex gap-2.5 ${m.role==='user'?'flex-row-reverse':''}`}>
              <div className={`w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center font-black text-xs ${m.role==='user'?'bg-blue-500 text-white':'bg-gradient-to-br from-indigo-500 to-purple-600 text-white'}`}>
                {m.role==='user'?me.name.charAt(0):<Icon name="bot" size={12} className="text-white"/>}
              </div>
              <div className={`max-w-[82%] p-3.5 rounded-2xl text-sm font-bold leading-relaxed whitespace-pre-wrap ${m.role==='user'?'bg-blue-600 text-white rounded-tr-sm':'bg-white/10 text-indigo-50 border border-white/10 rounded-tl-sm'}`}>
                {m.content}
              </div>
            </div>
          ))}
          {loading && (
            <div className="flex gap-2.5 items-center">
              <div className="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center"><Icon name="bot" size={12} className="text-white"/></div>
              <div className="bg-white/10 border border-white/10 p-3 rounded-2xl flex items-center gap-2">
                <div className="w-4 h-4 border-2 border-indigo-400 border-t-transparent rounded-full spin"></div>
                <span className="text-indigo-300 text-xs font-bold">กำลังคิด...</span>
              </div>
            </div>
          )}
          <div ref={endRef}/>
        </div>
        <div className="border-t border-indigo-900/50 p-3 bg-black/20">
          <div className="flex gap-2">
            <input
              value={inp} onChange={e=>setInp(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
              placeholder="พิมพ์ข้อความ..."
              disabled={loading}
              className="flex-1 bg-white/10 border border-white/20 text-white placeholder-indigo-400 px-4 py-3 rounded-2xl outline-none focus:border-indigo-400 font-bold text-sm"
            />
            <button onClick={()=>send()} disabled={loading||!inp.trim()} className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white px-5 py-3 rounded-2xl font-black transition flex items-center gap-1.5 text-sm">
              <Icon name="send" size={14}/> ส่ง
            </button>
          </div>
          {msgs.length>0 && <button onClick={()=>setMsgs([])} className="mt-1.5 text-indigo-500 hover:text-indigo-300 text-xs font-bold px-1 transition">ล้างการสนทนา</button>}
        </div>
      </div>
    </div>
  );
}

// RANKING
// ══════════════════════════════════════════════════════════════════════════
function Ranking({users,customers,me}){
  const team = users.filter(u=>u.role==='agent'&&u.team===me.team).map(u=>({
    ...u,
    rev:customers.filter(c=>c.agent_id===u.id&&c.status==='ปิดการขาย').reduce((a,c)=>a+Number(c.premium||0),0),
    cases:customers.filter(c=>c.agent_id===u.id&&c.status==='ปิดการขาย').length,
  })).sort((a,b)=>b.rev-a.rev);

  return (
    <div className="max-w-2xl mx-auto">
      <div className="text-center mb-6">
        <div className="w-16 h-16 bg-gradient-to-br from-yellow-300 to-orange-400 rounded-3xl flex items-center justify-center mx-auto mb-3 shadow-lg shadow-yellow-500/30"><Icon name="trophy" size={30} className="text-white"/></div>
        <h2 className="text-2xl font-black text-slate-800">Team Ranking</h2>
        <p className="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1 bg-slate-100 inline-block px-3 py-1 rounded-full">ทีม: {me.team}</p>
      </div>
      {team.length===0 && <div className="bg-white rounded-3xl p-10 text-center border-2 border-slate-100"><p className="text-slate-400 font-black">ยังไม่มีสมาชิกในทีม</p></div>}
      <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-5 space-y-3">
        {team.map((u,i)=>(
          <div key={u.id} className={`flex items-center justify-between p-4 rounded-2xl border-2 transition hover:-translate-y-0.5 hover:shadow-md ${i===0?'bg-gradient-to-r from-yellow-50 to-orange-50 border-yellow-200':'bg-slate-50 border-slate-100'}`}>
            <div className="flex items-center gap-3">
              <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-base ${i===0?'bg-gradient-to-br from-yellow-400 to-orange-500 text-white shadow-md':i===1?'bg-slate-200 text-slate-500':i===2?'bg-orange-100 text-orange-700':'bg-white border-2 border-slate-200 text-slate-400'}`}>
                {['🥇','🥈','🥉'][i]||i+1}
              </div>
              <div>
                <p className="font-black text-slate-800">{u.name} {u.id===me.id&&<span className="text-[9px] bg-blue-600 text-white px-2 py-0.5 rounded-full ml-1 uppercase tracking-widest">คุณ</span>}</p>
                <p className="text-xs font-bold text-slate-400">{u.cases} เคส</p>
              </div>
            </div>
            <span className={`text-xl font-black ${i===0?'text-orange-600':'text-slate-700'}`}>{fmt(u.rev)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// ADMIN
// ══════════════════════════════════════════════════════════════════════════
function AdminHome({users,customers}){
  const agents=users.filter(u=>u.role==='agent');
  const totalRev=customers.filter(c=>c.status==='ปิดการขาย').reduce((a,c)=>a+Number(c.premium||0),0);
  const mo=new Date().getMonth(),yr=new Date().getFullYear();
  const moRev=customers.filter(c=>c.status==='ปิดการขาย'&&c.closedDate&&new Date(c.closedDate).getMonth()===mo&&new Date(c.closedDate).getFullYear()===yr).reduce((a,c)=>a+Number(c.premium||0),0);

  const agentStats=agents.map(a=>({name:a.name.length>10?a.name.slice(0,10)+'…':a.name,rev:customers.filter(c=>c.agent_id===a.id&&c.status==='ปิดการขาย').reduce((a,c)=>a+Number(c.premium||0),0)})).sort((a,b)=>b.rev-a.rev);

  return (
    <div className="space-y-6">
      <div className="bg-gradient-to-br from-slate-900 via-purple-900 to-indigo-900 rounded-3xl p-7 text-white shadow-2xl">
        <h2 className="text-2xl font-black mb-1">Admin Dashboard</h2>
        <p className="text-purple-200 text-xs font-bold uppercase tracking-widest mb-6">ภาพรวมองค์กร</p>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            {l:'ยอดขายรวม',      v:fmt(totalRev),        c:'text-amber-400'},
            {l:'ยอดขายเดือนนี้', v:fmt(moRev),           c:'text-emerald-400'},
            {l:'ตัวแทน',         v:`${agents.length} คน`, c:'text-blue-300'},
            {l:'ลูกค้าทั้งหมด', v:`${customers.length} ราย`,c:'text-purple-300'},
          ].map((x,i)=>(
            <div key={i} className="bg-white/10 p-4 rounded-2xl border border-white/20 backdrop-blur-md">
              <p className="text-purple-200 text-xs font-bold uppercase tracking-widest mb-1">{x.l}</p>
              <h3 className={`text-xl font-black ${x.c}`}>{x.v}</h3>
            </div>
          ))}
        </div>
      </div>
      <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
        <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-5">
          <h3 className="font-black text-slate-800 mb-4 flex items-center gap-2 text-sm"><Icon name="users" size={16} className="text-blue-500"/> รายชื่อตัวแทน</h3>
          <table className="w-full text-left text-sm">
            <thead><tr className="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest"><th className="px-3 py-2.5 rounded-l-xl">ชื่อ</th><th className="px-3 py-2.5">ทีม</th><th className="px-3 py-2.5">Lead</th><th className="px-3 py-2.5 rounded-r-xl">ยอดขาย</th></tr></thead>
            <tbody className="divide-y divide-slate-50">
              {agents.map(a=>(
                <tr key={a.id} className="hover:bg-slate-50/50 transition">
                  <td className="px-3 py-3 font-black text-slate-800">{a.name}</td>
                  <td className="px-3 py-3"><span className="px-2 py-0.5 bg-purple-50 text-purple-700 rounded-lg font-black text-xs">{a.team}</span></td>
                  <td className="px-3 py-3 font-black text-slate-500">{customers.filter(c=>c.agent_id===a.id).length}</td>
                  <td className="px-3 py-3 font-black text-emerald-600">{fmt(customers.filter(c=>c.agent_id===a.id&&c.status==='ปิดการขาย').reduce((a,c)=>a+Number(c.premium||0),0))}</td>
                </tr>
              ))}
              {agents.length===0 && <tr><td colSpan={4} className="px-3 py-8 text-center text-slate-400 font-bold">ยังไม่มีตัวแทน</td></tr>}
            </tbody>
          </table>
        </div>
        <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-5 h-64">
          <h3 className="font-black text-slate-700 mb-3 text-sm">ยอดขายแต่ละตัวแทน</h3>
          <ResponsiveContainer width="100%" height="88%">
            <BarChart data={agentStats}>
              <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
              <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill:'#94a3b8',fontWeight:'700',fontSize:10}}/>
              <Tooltip contentStyle={{borderRadius:'12px',border:'none',fontWeight:'bold'}} formatter={v=>[fmt(v),'ยอดขาย']}/>
              <Bar dataKey="rev" radius={[8,8,0,0]}>{agentStats.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}</Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

function AdminData({customers,users,updC,delC}){
  const [q,setQ]     = useState('');
  const [sf,setSf]   = useState('ทั้งหมด');
  const [modal,setModal] = useState(null);
  const list=customers.filter(c=>(sf==='ทั้งหมด'||c.status===sf)&&(c.name.includes(q)||c.phone.includes(q)));
  return (
    <div className="space-y-5">
      <div className="flex flex-col md:flex-row justify-between gap-3">
        <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2"><Icon name="database" size={26} className="text-emerald-500"/> ฐานข้อมูลรวม</h2>
        <div className="flex gap-2">
          <div className="relative"><Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/><input value={q} onChange={e=>setQ(e.target.value)} placeholder="ค้นหา..." className="pl-9 pr-4 py-2.5 border-2 border-slate-200 rounded-xl outline-none font-bold text-sm focus:border-emerald-500 w-48"/></div>
          <select value={sf} onChange={e=>setSf(e.target.value)} className="px-3 py-2.5 border-2 border-slate-200 rounded-xl font-bold text-sm outline-none focus:border-emerald-500 bg-white"><option>ทั้งหมด</option>{STATUS_LIST.map(s=><option key={s}>{s}</option>)}</select>
        </div>
      </div>
      <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-left text-sm">
            <thead className="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest">
              <tr><th className="px-4 py-3">ชื่อ</th><th className="px-4 py-3">เบอร์</th><th className="px-4 py-3">สถานะ</th><th className="px-4 py-3">ตัวแทน</th><th className="px-4 py-3 text-right">เบี้ย</th><th className="px-4 py-3 text-center">จัดการ</th></tr>
            </thead>
            <tbody className="divide-y divide-slate-50">
              {list.map(c=>{
                const agent=users.find(u=>u.id===c.agent_id);
                return (
                  <tr key={c.id} className="hover:bg-slate-50/50 transition">
                    <td className="px-4 py-3.5 font-black text-slate-800">{c.name}</td>
                    <td className="px-4 py-3.5 font-bold text-slate-500">{c.phone}</td>
                    <td className="px-4 py-3.5"><span className={`px-2.5 py-1 rounded-xl text-xs font-black border-2 uppercase tracking-widest ${c.status==='ปิดการขาย'?'bg-emerald-50 border-emerald-200 text-emerald-700':'bg-slate-50 border-slate-200 text-slate-600'}`}>{c.status}</span></td>
                    <td className="px-4 py-3.5 font-black text-blue-600 text-xs">{agent?agent.name:'-'}</td>
                    <td className="px-4 py-3.5 font-black text-slate-700 text-right">{fmt(c.premium)}</td>
                    <td className="px-4 py-3.5 text-center"><button onClick={()=>setModal(c)} className="px-3 py-1 text-blue-600 font-black border-2 border-blue-100 rounded-xl text-xs hover:bg-blue-50 transition">แก้ไข</button></td>
                  </tr>
                );
              })}
              {list.length===0 && <tr><td colSpan={6} className="px-4 py-10 text-center text-slate-400 font-bold">ไม่พบข้อมูล</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
      {modal && <CustModal c={modal} onClose={()=>setModal(null)} onSave={updC} onDel={delC}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════════════════
function Settings({me,users,setUsers}){
  const [f,setF]   = useState({name:me.name,email:me.email,password:me.password,team:me.team});
  const [saved,setSaved] = useState(false);
  const submit = e => {
    e.preventDefault();
    if(f.email.toLowerCase()!==me.email.toLowerCase()&&users.find(u=>u.email.toLowerCase()===f.email.toLowerCase()&&u.id!==me.id)){ alert('อีเมลนี้ถูกใช้แล้ว'); return; }
    setUsers(u=>u.map(x=>x.id===me.id?{...x,...f}:x));
    setSaved(true); setTimeout(()=>setSaved(false),3000);
  };
  return (
    <div className="max-w-md mx-auto pt-4">
      <div className="text-center mb-6">
        <div className="w-16 h-16 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center font-black text-white text-2xl shadow-xl mx-auto mb-3 border-4 border-white">{me.name.charAt(0)}</div>
        <h2 className="text-2xl font-black text-slate-800">ตั้งค่าบัญชี</h2>
        <p className="text-slate-400 font-bold text-xs uppercase tracking-widest mt-0.5">{me.role==='admin'?'Administrator':`ทีม ${me.team}`}</p>
      </div>
      <form onSubmit={submit} className="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 space-y-4">
        {[
          {l:'อีเมล',      k:'email',   t:'email'},
          {l:'ชื่อ-นามสกุล',k:'name',  t:'text'},
          {l:'ชื่อทีม',    k:'team',   t:'text',  dis:me.role==='admin'},
          {l:'รหัสผ่าน',   k:'password',t:'password'},
        ].map(x=>(
          <div key={x.k}>
            <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-1.5">{x.l}</label>
            <input required type={x.t} value={f[x.k]} onChange={e=>setF(p=>({...p,[x.k]:e.target.value}))} disabled={x.dis} className={`w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none font-bold text-slate-800 text-sm transition ${x.dis?'bg-slate-50 text-slate-400 cursor-not-allowed':''}`}/>
          </div>
        ))}
        <button type="submit" className={`w-full py-3.5 font-black rounded-2xl transition flex items-center justify-center gap-2 text-sm ${saved?'bg-emerald-500 text-white shadow-emerald-500/20 shadow-lg':'bg-slate-800 hover:bg-slate-900 text-white shadow-lg'}`}>
          {saved ? <><Icon name="check-circle-2" size={16}/> บันทึกสำเร็จ!</> : <><Icon name="save" size={16}/> บันทึกการเปลี่ยนแปลง</>}
        </button>
      </form>
    </div>
  );
}

root.render(<App/>);

obs.observe(document.getElementById('root'),{childList:true,subtree:true});
